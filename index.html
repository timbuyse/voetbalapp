// ===================== LIVE MATCH =====================
function renderLive() {
  if (!match) return '<div class="content"><p>Geen wedstrijd.</p></div>';
  const ro = !!(match.fromCloud && !isAdmin); // kijker: alleen-lezen
  const q = match.quarters[match.quarters.length - 1];
  const isRunning = q && q.startTime && !q.pausedAt && !q.endTime;
  const isPaused = q && q.pausedAt;
  const isBetween = match.quarterStatus === 'between';
  const isDone = match.status === 'done';
  const qNum = match.currentQuarter;
  const canStartFirst = !ro && !isDone && qNum === 0;
  const canStartNext = !ro && !isDone && isBetween && qNum < match.numQuarters;
  const isLastPeriod = qNum >= match.numQuarters;
  const canEvent = !ro && (isRunning || isPaused) && !isDone;
  const dis = canEvent ? '' : 'disabled';
  const completed = (isBetween || isDone) ? qNum : qNum - 1;
  const dots = Array.from({length: match.numQuarters}, (_,i) => {
    const cls = i < completed ? 'done' : (i === qNum-1 && !isBetween && !isDone && qNum > 0 ? 'active' : '');
    return `<div class="qdot ${cls}"></div>`;
  }).join('');
  // Speeltijd-nudge: bankspelers die nog 0 minuten hebben zodra de match bezig is.
  const mNudge = (() => {
    if (isDone || qNum === 0) return '';
    const mins = calcMinutes(match);
    const zero = playersOnBench(match).filter(p => (mins[p.id] ? mins[p.id].ms : 0) === 0);
    return zero.length ? `<div class="nudge">⏱ Nog niet gespeeld: <b>${zero.map(p => esc(p.name)).join(', ')}</b></div>` : '';
  })();
  const curKeeper = (match.keeperByQ && match.keeperByQ[qNum]) ? pName(match, match.keeperByQ[qNum]) : null;
  const keeperChip = canEvent ? `<div style="text-align:center;margin-bottom:12px"><span class="keeper-chip" onclick="modalKeeper()">🧤 Keeper: ${curKeeper ? esc(curKeeper) : 'kies'} ✏️</span></div>` : '';

  let tabContent = '';
  if (tab === 'wedstrijd') {
    tabContent = `
      <div class="scoreboard">
        <div class="sb-teams"><span>${esc(tName(match))}</span><span>${esc(match.opponent)}</span></div>
        <div class="sb-score"><span class="us">${match.scoreUs}</span> – ${match.scoreThem}</div>
        <div class="sb-info">${isDone ? '✅ Afgelopen' : (isBetween ? `⏸ Pauze · klaar voor ${pSingLow(match)} ${qNum+1}` : (qNum > 0 ? `${pSing(match)} ${qNum} van ${match.numQuarters} · ${match.matchType}` : `${match.matchType} · nog niet gestart`))}</div>
      </div>
      <div class="timer-card">
        <div class="timer-time" id="timer-time">${timerText(match)}</div>
        <div class="timer-lbl" id="timer-lbl">Totale speeltijd: ${fmtTime(getGameTimeMs(match))}</div>
        <div class="qdots">${dots}</div>
        <div style="margin-top:10px"><span class="start-chip ${countdownOn()?'on':''}" onclick="toggleCountdown()" style="font-size:12px;padding:5px 12px">⏱ ${countdownOn()?'Aftellen':'Optellen'}</span></div>
      </div>
      ${keeperChip}
      ${mNudge}
      ${(!isDone && !ro) ? `<div class="qctrl">
        ${canStartFirst ? `<button class="qbtn qbtn-start" onclick="startQuarter()" style="grid-column:1/-1">▶ Start wedstrijd</button>` : ''}
        ${canStartNext ? `<button class="qbtn qbtn-start" onclick="startQuarter()" style="grid-column:1/-1">▶ Start ${pSingLow(match)} ${qNum+1}</button>` : ''}
        ${isRunning ? `<button class="qbtn qbtn-pause" onclick="pauseQuarter()">⏸ Pauze</button>` : ''}
        ${isPaused ? `<button class="qbtn qbtn-resume" onclick="resumeQuarter()">▶ Hervatten</button>` : ''}
        ${(isRunning||isPaused) ? (isLastPeriod
            ? `<button class="qbtn qbtn-end" onclick="endMatch()">🏁 Einde match</button>`
            : `<button class="qbtn qbtn-end" onclick="endPeriod()">⏹ Einde ${pSingLow(match)} ${qNum}</button>`) : ''}
      </div>` : ''}
      ${canStartNext ? `<div class="card" style="padding:12px;border-left:4px solid var(--org)">
        <div class="sec" style="margin-top:0">🔄 Pauzewissels · klaar voor ${pSingLow(match)} ${qNum+1}</div>
        ${(match.pendingSubs&&match.pendingSubs.length) ? match.pendingSubs.map((s,i)=>`<div class="prow" style="padding:8px 0"><div style="flex:1;font-size:14px">🔄 <b>${esc(pName(match,s.inId))}</b> <span style="color:var(--txt2)">voor</span> ${esc(pName(match,s.outId))}</div><button class="evt-del" onclick="removePendingSub(${i})" title="Verwijderen">×</button></div>`).join('') : `<p style="color:var(--txt2);font-size:13px">Nog geen wissels ingepland. Voeg ze nu toe; ze worden automatisch doorgevoerd bij de start van ${pSingLow(match)} ${qNum+1}.</p>`}
        <button class="btn btn-orgpale btn-sm" style="margin-top:8px;width:100%" onclick="modalSub()">➕ Pauzewissel toevoegen</button>
      </div>` : ''}
      ${ro ? '' : `<div class="evtbtns">
        <div class="evtbtn eg ${dis}" onclick="modalGoal()"><span class="ei">⚽</span><span class="el">Goal</span></div>
        <div class="evtbtn ec ${dis}" onclick="modalCorner()"><span class="ei">🚩</span><span class="el">Hoekschop</span></div>
        <div class="evtbtn es ${dis}" onclick="modalSub()"><span class="ei">🔄</span><span class="el">Wissel</span></div>
        ${(match.matchType==='3v3'||match.matchType==='5v5') ? '' : `<div class="evtbtn eyel ${dis}" onclick="modalCard('yellow')"><span class="ei">🟨</span><span class="el">Gele kaart</span></div>
        <div class="evtbtn ered ${dis}" onclick="modalCard('red')"><span class="ei">🟥</span><span class="el">Rode kaart</span></div>`}
        <div class="evtbtn epen ${dis}" onclick="modalPenalty()"><span class="ei">🎯</span><span class="el">Penalty</span></div>
        <div class="evtbtn einj ${dis}" onclick="modalInjury()"><span class="ei">🤕</span><span class="el">Blessure</span></div>
        <div class="evtbtn ${dis}" onclick="modalExtra()"><span class="ei">📊</span><span class="el">Meer</span></div>
      </div>`}
      ${(canEvent && hasUndo()) ? `<button class="btn btn-orgpale" onclick="undoLast()">↩ Laatste actie ongedaan maken</button>` : ''}
      ${isDone ? `<button class="btn btn-pale" onclick="go('detail','${match.id}')">📊 Wedstrijd bekijken</button>` : ''}`;
  } else if (tab === 'opstelling') {
    const on = playersOnField(match), off = playersOnBench(match), mins = calcMinutes(match);
    tabContent = `
      <div class="card">${renderPitch(match, on)}</div>
      <div class="card">
        <div class="sec" style="margin-top:0">Op het veld (${on.length})</div>
        ${on.length ? on.map(p => playerRowHtml(p, mins[p.id], false, getGameTimeMs(match))).join('') : '<p style="color:var(--txt2);font-size:14px">Niemand op het veld.</p>'}
        ${off.length ? `<hr><div class="sec">Bank (${off.length})</div>${off.map(p => playerRowHtml(p, mins[p.id], true, getGameTimeMs(match))).join('')}` : ''}
      </div>
      ${ro ? '' : `<button class="btn btn-orgpale" onclick="modalEditPlayers()">✏️ Spelers bewerken</button>`}`;
  } else {
    tabContent = (match.events.length
      ? `<div class="card">${renderEventLog(match)}</div>`
      : `<div class="empty"><div class="ei">📋</div><p>Nog geen events.</p></div>`)
      + (ro ? '' : `<button class="btn btn-pale" style="margin-top:4px" onclick="modalEditMatchInfo()">📋 Wedstrijdinfo bewerken</button>`);
  }

  return `
  <div class="hdr"><button class="back" onclick="confirmLeave()">‹</button>
    <div><h1>${esc(tName(match))} vs ${esc(match.opponent)}</h1><div class="hdr-sub">${match.location} · ${matchWhen(match)} · ${match.matchType}</div></div>
    ${(!isDone && !ro) ? `<button class="hdr-btn" onclick="endMatch()">Afsluiten</button>` : ''}
  </div>
  <div class="content">${ro ? '<div class="viewer-banner">👁 Je kijkt mee — dit scherm wordt live bijgewerkt</div>' : ''}${tabContent}</div>
  <div class="ltabs">
    <button class="ltab ${tab==='wedstrijd'?'act':''}" onclick="setTab('wedstrijd')"><span class="ti">⚽</span>Wedstrijd</button>
    <button class="ltab ${tab==='opstelling'?'act':''}" onclick="setTab('opstelling')"><span class="ti">👥</span>Opstelling</button>
    <button class="ltab ${tab==='log'?'act':''}" onclick="setTab('log')"><span class="ti">📋</span>Log</button>
  </div>`;
}

function playerRowHtml(p, minsData, isOff=false, totalMs=0) {
  const ms = minsData ? minsData.ms : 0;
  const m = Math.floor(ms / 60000);
  const cap = (match && match.captainId === p.id) ? ' <b style="color:var(--org)">©</b>' : '';
  const motm = (match && match.motmId === p.id) ? ' ⭐' : '';
  const pct = totalMs > 0 ? Math.round(ms / totalMs * 100) : null;
  const low = pct !== null && pct < 50;
  const bar = pct !== null ? `<div class="fairbar ${low?'low':''}" style="max-width:120px"><span style="width:${Math.min(100,pct)}%"></span></div>` : '';
  return `<div class="prow">
    <div class="pnum ${isOff?'pnum-off':''}">${p.number||'?'}</div>
    <div style="flex:1"><div class="pname">${esc(p.name)}${cap}${motm}</div><div class="ppos">${p.line}${p.posNum?' · pos '+p.posNum:''}${p.note?' · '+esc(p.note):''}</div>${bar}</div>
    <div class="pmins ${low?'pmins-warn':''}">${m}'${pct!==null?` · ${pct}%`:' gespeeld'}</div>
  </div>`;
}
function setTab(t) { tab = t; render(); if (t==='wedstrijd') startTimer(); else stopTimer(); }
function confirmLeave() {
  if (match && match.status === 'live') {
    openModal(`<h3>Wedstrijd verlaten?</h3>
      <p style="text-align:center;color:var(--txt2);margin-bottom:16px">De wedstrijd loopt nog. Je kan later terugkomen.</p>

  } else go('home');
}

// ===================== QUARTER CONTROLS =====================
async function startQuarter() {
  match.currentQuarter++;
  match.quarterStatus = 'running';
  match.quarters.push({ num: match.currentQuarter, startTime: Date.now(), endTime: null, totalPaused: 0, pausedAt: null });
  addEvent('quarter_start');
  // Tijdens de pauze ingeplande wissels nu automatisch doorvoeren bij de start van het deel.
  for (const s of (match.pendingSubs || [])) {
    const pOut = match.players.find(p => p.id === s.outId), pIn = match.players.find(p => p.id === s.inId);
    if (!pOut || !pIn) continue;
    addEvent('substitution', { playerOutId: s.outId, playerInId: s.inId, atBreak: true });
    pOut.onField = false;
    pIn.onField = true; pIn.x = pOut.x; pIn.y = pOut.y; pIn.line = pOut.line;
  }
  match.pendingSubs = [];
  // Keeper voor dit deel: standaard de speler op de doellijn, instelbaar via de keeper-chip.
  match.keeperByQ = match.keeperByQ || {};
  if (!match.keeperByQ[match.currentQuarter]) {
    const gk = match.players.find(p => p.onField && p.line === 'Doel');
    if (gk) match.keeperByQ[match.currentQuarter] = gk.id;
  }
  requestWake();
  await dbSave(match); startTimer(); render();
}
function modalKeeper() {
  const on = playersOnField(match);
  const cur = match.keeperByQ && match.keeperByQ[match.currentQuarter];
  openModal(`<h3>🧤 Keeper · ${pSing(match)} ${match.currentQuarter}</h3>
    ${on.map(p => `<div class="mopt ${cur===p.id?'sel':''}" onclick="setKeeper('${p.id}')"><div class="mopt-num">${p.number||'?'}</div>${esc(p.name)} <span style="color:var(--txt2);font-size:13px">${p.line}</span></div>`).join('')}
    <button class="btn btn-gray" style="margin-top:12px" onclick="closeModal()">Sluiten</button>`);
}
async function setKeeper(id) { match.keeperByQ = match.keeperByQ || {}; match.keeperByQ[match.currentQuarter] = id; await dbSave(match); closeModal(); render(); }
// Minuten in doel per keeper (op basis van keeperByQ × duur per deel).
function keeperMinutes(m) {
  const out = {};
  if (!m.keeperByQ) return out;
  for (const q of m.quarters) {
    const kid = m.keeperByQ[q.num]; if (!kid) continue;
    const dur = q.endTime ? q.endTime - q.startTime - (q.totalPaused || 0) : 0;
    out[kid] = (out[kid] || 0) + Math.max(0, dur);
  }
  return out;
}
async function pauseQuarter() {
  const q = match.quarters[match.quarters.length - 1];
  q.pausedAt = Date.now(); match.quarterStatus = 'paused';
  releaseWake();
  await dbSave(match); render();
}
async function resumeQuarter() {
  const q = match.quarters[match.quarters.length - 1];
  q.totalPaused = (q.totalPaused || 0) + (Date.now() - q.pausedAt); q.pausedAt = null;
  match.quarterStatus = 'running';
  requestWake();
  await dbSave(match); startTimer(); render();
}
// Beëindig het huidige deel handmatig -> pauze tussen de delen (klok staat stil tot de volgende start).
function endPeriod() {
  const label = pSingLow(match);
  openModal(`<h3>Einde ${label} ${match.currentQuarter}?</h3>
    <p style="text-align:center;color:var(--txt2);margin-bottom:16px">De klok stopt en je kan dit ${label} niet meer hervatten.</p>
    <button class="btn btn-red" onclick="doEndPeriod()">⏹ Ja, beëindig ${label}</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
async function doEndPeriod() {
  const q = match.quarters[match.quarters.length - 1];
  if (!q) { closeModal(); return; }
  if (q.pausedAt) { q.totalPaused = (q.totalPaused || 0) + (Date.now() - q.pausedAt); q.pausedAt = null; }
  q.endTime = Date.now();
  addEvent('quarter_end');
  match.quarterStatus = 'between';
  stopTimer(); releaseWake(); await dbSave(match); closeModal(); render();
}

async function setMotm(id) { match.motmId = id; await dbSave(match); closeModal(); render(); }
async function shareReport() {
  const m = match;
  const tally = (filter, key) => {
    const cnt = {};
    m.events.filter(filter).forEach(e => { const id = e[key]; if (!id) return; const n = pName(m, id); cnt[n] = (cnt[n] || 0) + 1; });
    return Object.entries(cnt).map(([n, c]) => c > 1 ? `${n} (${c})` : n).join(', ');
  };
  const scLine = tally(e => e.type === 'goal_us' || (e.type === 'penalty_us' && e.scored), 'playerId');
  const asLine = tally(e => e.type === 'goal_us' && e.assistId, 'assistId');
  const ycLine = tally(e => e.type === 'yellow_card', 'playerId');
  const rcLine = tally(e => e.type === 'red_card', 'playerId');
  const lines = [`${tName(m)} ${m.scoreUs}-${m.scoreThem} ${m.opponent}`, `${matchWhen(m)} · ${m.location}${m.competition ? ' · ' + m.competition : ''}`];
  if (scLine) lines.push(`⚽ ${scLine}`);
  if (asLine) lines.push(`🎯 Assists: ${asLine}`);
  if (ycLine) lines.push(`🟨 ${ycLine}`);
  if (rcLine) lines.push(`🟥 ${rcLine}`);
  if (m.motmId) lines.push(`⭐ Man v/d match: ${pName(m, m.motmId)}`);
  if (m.notes) lines.push('', m.notes);
  // Volgende geplande wedstrijd van dezelfde ploeg
  try {
    const all = await dbAll();
    const today = new Date().toISOString().split('T')[0];
    const next = all.filter(x => x.teamName === m.teamName && x.status === 'planned' && (x.date || '') >= today).sort((a, b) => (a.date || '').localeCompare(b.date || ''))[0];
    if (next) lines.push('', `📅 Volgende: ${tName(next)} vs ${next.opponent} — ${matchWhen(next)}${next.location ? ' · ' + next.location : ''}`);
  } catch (e) {}
  lines.push('', `— ${getClubName()}`);
  const text = lines.join('\n');
  if (navigator.share) { try { await navigator.share({ title: `${tName(m)} vs ${m.opponent}`, text }); } catch (e) {} }
  else { try { await navigator.clipboard.writeText(text); alert('Verslag gekopieerd naar klembord ✓'); } catch (e) { alert(text); } }
}
// Eén wedstrijd exporteren als bestand (om door te sturen of op een ander toestel te importeren).
function exportMatch() {
  const data = { app: 'voetbal-match', version: 1, exportedAt: Date.now(), match };
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const safe = `${tName(match)}-${match.opponent}-${match.date || ''}`.replace(/[^a-z0-9]+/gi, '-').toLowerCase();
  a.download = `match-${safe}.json`;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
async function forceEndMatch() {
  const q = match.quarters[match.quarters.length - 1];
  if (q && !q.endTime) { if (q.pausedAt) { q.totalPaused=(q.totalPaused||0)+(Date.now()-q.pausedAt); q.pausedAt=null; } q.endTime = Date.now(); }
  match.status = 'done'; match.quarterStatus = 'done';
  stopTimer(); releaseWake(); await dbSave(match); render();
}
function addEvent(type, extra={}) {
  match.events.push({ id: uid(), realTime: Date.now(), gameTimeMs: getGameTimeMs(match), quarterNum: match.currentQuarter, type, ...extra });
}

// Een bestaand event bewerken (speler/assist/minuut/details).
function modalEditEvent(id) {
  const e = match.events.find(x => x.id === id); if (!e) return;
  const minute = gameMin(e.gameTimeMs);
  const opts = (sel, withNone) => `${withNone ? '<option value="">—</option>' : ''}${match.players.map(p => `<option value="${p.id}" ${sel === p.id ? 'selected' : ''}>${p.number ? '#' + p.number + ' ' : ''}${esc(p.name)}</option>`).join('')}`;
  const t = e.type; let fields = '';
  if (t === 'goal_us') fields = `<div class="fg"><label>Doelpuntenmaker</label><select id="ee-player">${opts(e.playerId)}</select></div><div class="fg"><label>Assist</label><select id="ee-assist">${opts(e.assistId, true)}</select></div>`;
  else if (t === 'yellow_card' || t === 'red_card') fields = `<div class="fg"><label>Speler</label><select id="ee-player">${opts(e.playerId)}</select></div>`;
  else if (t === 'own_goal' || t === 'freekick_us') fields = `<div class="fg"><label>Speler</label><select id="ee-player">${opts(e.playerId, true)}</select></div>`;
  else if (t === 'corner_us') fields = `<div class="fg"><label>Nemer</label><select id="ee-player">${opts(e.playerId, true)}</select></div><div class="fg"><label>Type</label><select id="ee-ctype"><option value="lang" ${e.cornerType === 'lang' ? 'selected' : ''}>Lang</option><option value="kort" ${e.cornerType === 'kort' ? 'selected' : ''}>Kort</option></select></div>`;

async function saveEditEvent(id) {
  const e = match.events.find(x => x.id === id); if (!e) return;
  const has = i => document.getElementById(i);
  const val = i => { const el = has(i); return el ? el.value : undefined; };
  const min = parseInt(val('ee-min'));
  if (!isNaN(min) && min > 0) e.gameTimeMs = (min - 1) * 60000;
  if (has('ee-player')) e.playerId = val('ee-player') || null;
  if (has('ee-assist')) e.assistId = val('ee-assist') || null;
  if (has('ee-ctype')) e.cornerType = val('ee-ctype');
  if (has('ee-scored')) e.scored = val('ee-scored') === '1';
  if (has('ee-out')) e.playerOutId = val('ee-out');
  if (has('ee-in')) e.playerInId = val('ee-in');
  if (has('ee-itype')) e.injuryType = val('ee-itype');
  if (has('ee-leaves')) e.leavesField = has('ee-leaves').checked;
  if (has('ee-ontarget')) e.onTarget = has('ee-ontarget').checked;
  if (has('ee-reason')) e.reason = val('ee-reason');
  recomputeScore(match); recomputeOnField(match);
  await dbSave(match); closeModal(); render();
}

async function undoLast() {
  let idx = -1;
  for (let i = match.events.length - 1; i >= 0; i--) { const t = match.events[i].type; if (t !== 'quarter_start' && t !== 'quarter_end') { idx = i; break; } }

    <div id="sub-in">${off.length ? off.map(p=>{ const low = (mins[p.id]?.ms||0)===minMs; return `<div class="mopt" onclick="selectSubIn('${p.id}',this)"><div class="mopt-num mopt-num-off">${p.number||'?'}</div>${esc(p.name)} ${low?'<span style="color:var(--org);font-size:12px;font-weight:700">💤 minst</span>':''}<span class="${low?'pmins-low':''}" style="color:var(--txt2);font-size:13px;margin-left:auto">${mm(p.id)}'</span></div>`; }).join('') : '<p style="color:var(--txt2);font-size:14px;padding:8px 0">Geen spelers op de bank.</p>'}</div>

function selectSubOut(id, el) { subOut = id; document.querySelectorAll('#sub-out .mopt').forEach(o => o.classList.remove('sel')); el.classList.add('sel'); }
function selectSubIn(id, el) { subIn = id; document.querySelectorAll('#sub-in .mopt').forEach(o => o.classList.remove('sel')); el.classList.add('sel'); }
async function confirmSub() {
  if (!subOut || !subIn) { alert('Kies wie eraf gaat en wie erin komt.'); return; }
  // Tijdens de pauze: wissel inplannen i.p.v. meteen doorvoeren.
  if (match.quarterStatus === 'between') {
    match.pendingSubs = match.pendingSubs || [];
    match.pendingSubs.push({ outId: subOut, inId: subIn });
    await dbSave(match); closeModal(); render();
    return;
  }
  addEvent('substitution', { playerOutId: subOut, playerInId: subIn });
  const pOut = match.players.find(p => p.id === subOut), pIn = match.players.find(p => p.id === subIn);
  if (pOut) pOut.onField = false;
  if (pIn) { pIn.onField = true; if (pOut) { pIn.x = pOut.x; pIn.y = pOut.y; pIn.line = pOut.line; } }
  await dbSave(match); closeModal(); render();
}

function renderDetail() {
  if (!match) return '<div class="content"><p>Niet gevonden.</p></div>';
  const mins = calcMinutes(match);
  const qSummary = match.quarters.map(q => {
    const dur = q.endTime ? q.endTime - q.startTime - (q.totalPaused||0) : getQElapsed(match);
    const goals = match.events.filter(e => (e.type==='goal_us'||e.type==='goal_them'||e.type==='own_goal'||(e.type.startsWith('penalty')&&e.scored)) && e.quarterNum === q.num);
    const cum = scoreUpToQuarter(match, q.num);
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr)">
      <div style="font-weight:800;min-width:32px">${pAbbr(match)}${q.num}</div>
      <div style="font-weight:900;min-width:54px;font-variant-numeric:tabular-nums"><span style="color:var(--grn)">${cum.us}</span>–${cum.them}</div>
      <div style="flex:1;font-size:13px;color:var(--txt2)">${fmtTime(dur)}</div>
      <div style="font-size:13px;text-align:right">${goals.map(e=>evtLabel(e,match)).join('<br>')||'–'}</div>
    </div>`;
  }).join('');

  return `
  <div class="hdr"><button class="back" onclick="go('home')">‹</button>
    <div><h1>${esc(tName(match))} vs ${esc(match.opponent)}</h1><div class="hdr-sub">${match.location} · ${matchWhen(match)} · ${match.matchType}</div></div>
  </div>
  <div class="content">
    <div class="card" style="text-align:center">
      <div style="font-size:13px;color:var(--txt2);margin-bottom:4px">Eindscore</div>
      <div style="font-size:50px;font-weight:900;color:var(--txt)"><span style="color:var(--grn)">${match.scoreUs}</span> – ${match.scoreThem}</div>
      <div style="font-size:14px;color:var(--txt2)">${esc(tName(match))} – ${esc(match.opponent)}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px" class="no-print">
      <button class="btn btn-green btn-sm" onclick="shareReport()">📤 Delen</button>
      <button class="btn btn-org btn-sm" onclick="exportPDF()">📄 PDF</button>
      <button class="btn btn-pale btn-sm" onclick="exportMatch()">⬇ Export</button>
    </div>
    <div class="sec">Wedstrijdinfo</div>
    <div class="card">
      ${[['Formatie',match.formation],['Trainer',match.trainer],['Ploegverantwoordelijke',match.responsible],['Soort',match.competition],['Speeldag',match.matchday],['Scheidsrechter',match.referee],['Truitkleur',match.jersey],['Weer / veld',match.weather],['Kapitein',match.captainId?pName(match,match.captainId):'']].filter(([k,v])=>v).map(([k,v])=>`<div class="stat-row"><span style="color:var(--txt2);min-width:120px">${k}</span><span style="font-weight:600">${esc(v)}</span></div>`).join('') || '<p style="color:var(--txt2);font-size:14px">Geen extra info ingevuld.</p>'}
      <div class="stat-row"><span style="color:var(--txt2);min-width:120px">⭐ Man v/d match</span><span style="font-weight:600">${match.motmId?esc(pName(match,match.motmId)):'—'}</span><button class="btn btn-pale btn-sm no-print" style="margin-left:auto;width:auto" onclick="modalMotm()">Kiezen</button></div>
    </div>
    <div class="sec">Notities</div>
    <div class="card">
      <p class="notes-txt" style="${match.notes?'':'color:var(--txt2)'}">${match.notes?esc(match.notes):'Geen notities.'}</p>
      <button class="btn btn-pale btn-sm no-print" style="margin-top:10px" onclick="modalNotes()">✏️ Bewerken</button>
    </div>
    <div class="sec">Opstelling</div>
    <div class="card">${renderPitch(match, match.players.filter(p=>p.starting))}</div>
    ${match.quarters.length ? `<div class="sec">Per ${pSingLow(match)}</div><div class="card">${qSummary}</div>` : ''}
    ${(match.keeperByQ && Object.keys(match.keeperByQ).length) ? (() => {
      const km = keeperMinutes(match);
      const perQ = match.quarters.map(q => { const kid = match.keeperByQ[q.num]; return `<div class="stat-row"><span style="min-width:40px;font-weight:800">${pAbbr(match)}${q.num}</span><span style="flex:1">${kid?esc(pName(match,kid)):'—'}</span></div>`; }).join('');
      const totals = Object.entries(km).map(([id,ms]) => `<div class="stat-row"><span style="flex:1">${esc(pName(match,id))}</span><span style="font-weight:800">${Math.round(ms/60000)}' in doel</span></div>`).join('');
      return `<div class="sec">🧤 Keeper per ${pSingLow(match)}</div><div class="card">${perQ}${totals?`<hr>${totals}`:''}</div>`;
    })() : ''}
    <div class="sec">Speelminuten <span style="font-weight:400;text-transform:none;color:var(--txt2)">(balk = % van de speeltijd · rood < 50%)</span></div>
    <div class="card">${match.players.map(p => playerRowHtml(p, mins[p.id], !p.onField, getGameTimeMs(match))).join('')}</div>
    <div class="sec">Events (${match.events.length})</div>
    <div class="card">${renderEventLog(match)}</div>
    ${(match.fromCloud && !isAdmin) ? '' : `<div class="no-print">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <button class="btn btn-orgpale" onclick="modalEditPlayers()">✏️ Spelers bewerken</button>
        <button class="btn btn-pale" onclick="modalEditMatchInfo()">📋 Info bewerken</button>
      </div>
      <div class="danger"><button class="btn btn-red" onclick="confirmDelete()">🗑 Wedstrijd verwijderen</button></div>
    </div>`}
  </div>`;
}
function confirmDelete() {
  openModal(`<h3>Wedstrijd verwijderen?</h3>
    <p style="text-align:center;color:var(--txt2);margin-bottom:16px">Dit kan niet ongedaan gemaakt worden.</p>
    <button class="btn btn-red" onclick="deleteCurrentMatch()">🗑 Ja, verwijderen</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
async function deleteCurrentMatch() { await dbDel(match.id); match = null; closeModal(); go('home'); }

// ===================== PDF EXPORT =====================
function exportPDF() {
  const m = match, mins = calcMinutes(m);
  const evts = [...m.events];
  const stat = (type) => m.events.filter(e => e.type === type).length;
  const goals = m.events.filter(e => e.type==='goal_us');
  const scorers = {};
  goals.forEach(e => { const n = pName(m,e.playerId); scorers[n] = (scorers[n]||0)+1; });
  const assists = {};
  goals.forEach(e => { if (e.assistId){ const n = pName(m,e.assistId); assists[n]=(assists[n]||0)+1; } });

  const playerRows = m.players.map(p => {
    const min = mins[p.id] ? Math.floor(mins[p.id].ms/60000) : 0;
    const g = m.events.filter(e=>(e.type==='goal_us'||(e.type==='penalty_us'&&e.scored))&&e.playerId===p.id).length;
    const a = m.events.filter(e=>e.type==='goal_us'&&e.assistId===p.id).length;
    const yc = m.events.filter(e=>e.type==='yellow_card'&&e.playerId===p.id).length;
    const rc = m.events.filter(e=>e.type==='red_card'&&e.playerId===p.id).length;
    return `<tr><td>${p.number||''}</td><td>${esc(p.name)}</td><td>${p.line}${p.posNum?' ('+p.posNum+')':''}</td><td style="text-align:center">${min}'</td><td style="text-align:center">${g||''}</td><td style="text-align:center">${a||''}</td><td style="text-align:center">${yc?'🟨'.repeat(yc):''}${rc?'🟥':''}</td></tr>`;
  }).join('');

  const infoBits = [m.formation, m.competition, m.matchday && ('speeldag ' + m.matchday), m.trainer && ('trainer ' + m.trainer), m.responsible && ('afgevaardigde ' + m.responsible), m.referee && ('ref. ' + m.referee), m.jersey && ('trui ' + m.jersey), m.weather, m.captainId && ('kapitein ' + pName(m, m.captainId))].filter(Boolean);

  const perQuarterRows = m.quarters.map(q => {
    const dur = q.endTime ? q.endTime - q.startTime - (q.totalPaused || 0) : 0;
    const cum = scoreUpToQuarter(m, q.num);
    const gs = m.events.filter(e => (e.type === 'goal_us' || e.type === 'goal_them' || e.type === 'own_goal' || (e.type.startsWith('penalty') && e.scored)) && e.quarterNum === q.num).map(e => evtLabel(e, m)).join('<br>') || '–';
    return `<tr><td><b>${pAbbr(m)}${q.num}</b></td><td style="font-weight:900;white-space:nowrap"><span style="color:#1f9d4d">${cum.us}</span> – ${cum.them}</td><td style="white-space:nowrap">${Math.round(dur / 60000)} min</td><td>${gs}</td></tr>`;
  }).join('');

  const timelineRows = eventsByQuarter(m).map(g => {
    const head = g.qn == null ? 'Overig' : `${pSing(m)} ${g.qn}${g.cum ? ` — tussenstand ${g.cum.us}–${g.cum.them}` : ''}`;
    const rows = g.list.length ? g.list.map(e => `<tr><td style="white-space:nowrap">${gameMin(e.gameTimeMs)}'</td><td>${evtLabel(e, m)}</td></tr>`).join('') : `<tr><td></td><td style="color:#9ca3af">Geen events</td></tr>`;
    return `<tr><td colspan="2" style="background:#f1f3f5;font-weight:700;border-top:2px solid #d1d5db">${head}</td></tr>${rows}`;
  }).join('');

  const html = `<!DOCTYPE html><html lang="nl"><head><meta charset="utf-8"><title>${esc(tName(m))} vs ${esc(m.opponent)}</title>
    <style>
      body{font-family:Arial,sans-serif;color:#171717;padding:24px;max-width:800px;margin:0 auto}
      .top{display:flex;align-items:center;gap:14px;border-bottom:3px solid #f5821f;padding-bottom:14px;margin-bottom:18px}
      .top .logo{width:54px;height:54px;background:#101010;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#f5821f;font-weight:bold;font-size:20px}
      h1{font-size:20px;margin:0}
      .sub{color:#6b7280;font-size:13px;margin-top:3px}
      .score{text-align:center;font-size:42px;font-weight:900;margin:16px 0}
      .score .us{color:#1f9d4d}
      h2{font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;border-bottom:1px solid #e5e7eb;padding-bottom:5px;margin-top:24px}
      table{width:100%;border-collapse:collapse;font-size:13px}
      th,td{padding:6px 8px;border-bottom:1px solid #eee;text-align:left}
      th{color:#6b7280;font-size:11px;text-transform:uppercase}
      .stats{display:flex;gap:18px;flex-wrap:wrap;font-size:13px}
      .stats div{background:#f5f6f5;padding:8px 14px;border-radius:8px}
      .stats b{color:#1f9d4d}
      @media print{body{padding:0}}
    </style></head><body>
    <div class="top"><img src="${getClubLogo()}" style="width:54px;height:54px;object-fit:contain;border-radius:10px;background:${(JSON.parse(localStorage.getItem('voetbal_theme')||'null')||GENERIC_THEME).dark}">
      <div><h1>${esc(tName(m))} <span style="color:#6b7280;font-weight:400">vs</span> ${esc(m.opponent)}</h1>
      <div class="sub">${matchWhen(m)} · ${m.location} · ${m.matchType} · ${m.numQuarters} ${pPlural(m)} × ${m.quarterDuration} min</div>
      ${infoBits.length?`<div class="sub">${infoBits.map(esc).join(' · ')}</div>`:''}</div>
    </div>
    <div class="score"><span class="us">${m.scoreUs}</span> – ${m.scoreThem}</div>
    ${m.motmId?`<p style="text-align:center;font-weight:700;margin:-8px 0 10px">⭐ Man van de match: ${esc(pName(m,m.motmId))}</p>`:''}
    ${m.players.some(p=>p.starting)?`<h2>Basisopstelling${m.formation?` · ${esc(m.formation)}`:''}</h2>
    <div style="text-align:center;margin:10px 0">${pitchSVG(m, m.players.filter(p=>p.starting))}</div>
    <p style="text-align:center;color:#9ca3af;font-size:11px;margin-top:-4px">🟠 doelman · cijfer = rugnummer · © kapitein</p>`:''}
    ${m.quarters.length?`<h2>Tussenstand per ${pSingLow(m)}</h2>
    <table><thead><tr><th>${pSing(m)}</th><th>Tussenstand</th><th>Duur</th><th>Doelpunten</th></tr></thead>
    <tbody>${perQuarterRows}</tbody></table>`:''}
    <h2>Wedstrijdstatistieken</h2>
    <div class="stats">
      <div>Schoten: <b>${stat('shot_us')}</b> – ${stat('shot_them')}</div>
      <div>Schoten op doel: <b>${m.events.filter(e=>e.type==='shot_us'&&e.onTarget).length}</b> – ${m.events.filter(e=>e.type==='shot_them'&&e.onTarget).length}</div>
      <div>Reddingen: <b>${stat('save_us')}</b> – ${stat('save_them')}</div>
      <div>Hoekschoppen: <b>${stat('corner_us')}</b> – ${stat('corner_them')}</div>
      <div>Vrije trappen: <b>${stat('freekick_us')}</b> – ${stat('freekick_them')}</div>
      <div>Penalty's: <b>${stat('penalty_us')}</b> – ${stat('penalty_them')}</div>
      <div>🟨 ${stat('yellow_card')} · 🟥 ${stat('red_card')}</div>
    </div>
    <h2>Spelers</h2>
    <table><thead><tr><th>#</th><th>Naam</th><th>Positie</th><th>Speeltijd</th><th>Goals</th><th>Assists</th><th>Kaarten</th></tr></thead>
    <tbody>${playerRows}</tbody></table>
    ${m.players.some(p=>p.note) ? `<h2>Notities per speler</h2>${m.players.filter(p=>p.note).map(p=>`<div style="font-size:13px;padding:3px 0"><b>${esc(p.name)}:</b> ${esc(p.note)}</div>`).join('')}` : ''}
    ${m.notes ? `<h2>Notities</h2><p style="white-space:pre-wrap;font-size:13px;line-height:1.5">${esc(m.notes)}</p>` : ''}
    <h2>Volledige tijdlijn (${evts.length} events)</h2>
    <table><tbody>${timelineRows||'<tr><td>Geen events</td></tr>'}</tbody></table>
    <p style="margin-top:30px;color:#9ca3af;font-size:11px;text-align:center">${esc(getClubName())} · app created by Tim Buyse</p>
    <script>window.onload=function(){setTimeout(function(){window.print();},300);};<\/script>
    </body></html>`;

  const w = window.open('', '_blank');
  if (!w) { alert('Sta pop-ups toe om de PDF te maken.'); return; }
  w.document.write(html); w.document.close();
}

// ===================== HELPERS =====================
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===================== INIT =====================
async function init() {
  db = await openDB();
  applyStoredTheme(); applyDark();
  migrateTeams();
  cloudInit();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && view === 'live' && match) {
      const q = match.quarters[match.quarters.length - 1];
      if (q && q.startTime && !q.pausedAt && !q.endTime) requestWake();
    }
  });
  if (!setupDone()) { view = 'setup'; render(); return; }
  const all = await dbAll();
  const live = all.find(m => m.status === 'live');
  if (live) { match = live; view = 'live'; startTimer(); }
  render();
}
views.teams = renderTeamsList;
views.teamEdit = renderTeamEdit;
views.prep = renderPrep;
views.new = renderNew;
function newMatch() { startWizard(); go('new'); }
init();
</script>
