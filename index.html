<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sparta Petegem">
  <meta name="theme-color" content="#101010">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Football Score Tracking App</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --blk:#0f172a;--blk2:#1e293b;--blk3:#334155;
      --grn:#2563eb;--grn2:#1d4ed8;--grnp:#e8eefc;--grnb:#c3d4f7;
      --org:#f59e0b;--org2:#d97706;--orgp:#fdf0d9;--orgb:#f8d79a;
      --yl:#eab308;--ylp:#fef9c3;--rd:#dc2626;--rdp:#fee2e2;--bl:#2563eb;--blp:#eff6ff;
      --bg:#f5f6f5;--card:#fff;--txt:#171717;--txt2:#6b7280;--bdr:#e5e7eb;
      --shadow:0 2px 8px rgba(0,0,0,.1)
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;overflow-x:hidden}
    /* Header */
    .hdr{background:var(--blk);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.3);border-bottom:3px solid var(--org)}
    .hdr h1{font-size:17px;font-weight:700;flex:1}
    .hdr-sub{font-size:12px;opacity:.7}
    .back{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;padding:2px 4px;line-height:1}
    .hdr-btn{background:var(--org);border:none;color:#fff;font-size:13px;font-weight:700;padding:7px 13px;border-radius:8px;cursor:pointer}
    .hdr-logo{width:30px;height:30px;border-radius:7px;flex-shrink:0}
    .hdr-home{justify-content:center;padding:10px 16px}
    .hdr-fulllogo{height:44px;width:auto}
    .credit{text-align:center;font-size:12px;color:var(--txt2);padding:4px 0 28px}
    .credit b{color:var(--blk)}
    .hdr-gear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:21px;cursor:pointer;opacity:.85;padding:6px}
    .hdr-crest{height:38px;width:38px;object-fit:contain;border-radius:6px}
    .hdr-clubname{font-size:17px;font-weight:800;color:#fff;margin-left:9px}
    .logo-preview{display:flex;justify-content:center;margin-bottom:10px}
    .logo-preview img{max-height:120px;max-width:85%;object-fit:contain;background:var(--blk);border-radius:12px;padding:12px}
    .logo-empty{height:110px;width:100%;max-width:85%;border:2px dashed var(--bdr);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:14px;font-weight:600}
    .file-btn{display:block;width:100%;padding:13px;border:2px dashed var(--grnb);border-radius:10px;text-align:center;font-size:14px;font-weight:700;color:var(--grn2);cursor:pointer;background:var(--grnp)}
    .file-btn input[type=file]{display:none}
    .welcome{text-align:center;padding:8px 4px 16px}
    .welcome h2{font-size:22px;margin-bottom:6px}
    .welcome p{font-size:14px;color:var(--txt2);line-height:1.5}
    /* Content */
    .content{padding:16px;max-width:600px;margin:0 auto;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
    /* Card */
    .card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:10px;border:none;font-size:16px;font-weight:600;cursor:pointer;min-height:50px;width:100%;transition:opacity .15s,transform .1s}
    .btn:active{transform:scale(.97);opacity:.85}
    .btn-green{background:var(--grn);color:#fff}
    .btn-org{background:var(--org);color:#fff}
    .btn-dark{background:var(--blk);color:#fff}
    .btn-pale{background:var(--grnp);color:var(--grn2)}
    .btn-orgpale{background:var(--orgp);color:var(--org2)}
    .btn-red{background:var(--rdp);color:var(--rd)}
    .btn-gray{background:#f1f1f1;color:var(--txt)}
    .btn-sm{padding:9px 14px;font-size:14px;min-height:38px;width:auto}
    /* Form */
    .fg{margin-bottom:14px}
    .fg label{display:block;font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
    .fg input,.fg select{width:100%;padding:12px;border:2px solid var(--bdr);border-radius:8px;font-size:16px;color:var(--txt);background:#fff;-webkit-appearance:none}
    .fg input:focus,.fg select:focus{outline:none;border-color:var(--grn)}
    .fg textarea{width:100%;padding:12px;border:2px solid var(--bdr);border-radius:8px;font-size:16px;color:var(--txt);font-family:inherit;resize:vertical;-webkit-appearance:none}
    .fg textarea:focus{outline:none;border-color:var(--grn)}
    .chkrow{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:13px;font-weight:600;color:var(--txt2);text-transform:none;letter-spacing:0}
    .chkrow input{width:auto;transform:scale(1.3)}
    .team-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .team-chips-lbl{width:100%;font-size:12px;color:var(--txt2);font-weight:600;text-transform:none;letter-spacing:0;margin-bottom:2px}
    .team-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 5px 6px 12px;border-radius:20px;border:2px solid var(--bdr);background:#fff;font-size:13px;font-weight:600;cursor:pointer}
    .team-chip-x{border:none;background:var(--rdp);color:var(--rd);width:21px;height:21px;border-radius:50%;font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .filterbar{margin-bottom:12px}
    .filterbar select{width:100%;padding:11px;border:2px solid var(--bdr);border-radius:10px;font-size:15px;background:#fff;font-weight:600;color:var(--txt);-webkit-appearance:none}
    .notes-txt{white-space:pre-wrap;font-size:14px;line-height:1.45}
    .more-details{margin-top:6px;border-top:1px solid var(--bdr);padding-top:10px}
    .more-details summary{font-size:13px;font-weight:700;color:var(--grn2);cursor:pointer;list-style:none}
    .more-details summary::-webkit-details-marker{display:none}
    .pmins-low{color:var(--org)!important;font-weight:800}
    .evt-del{margin-left:auto;background:var(--rdp);border:none;color:var(--rd);width:28px;height:28px;border-radius:7px;font-size:15px;cursor:pointer;flex-shrink:0}
    .stat-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr);font-size:14px}
    .stat-row:last-child{border-bottom:none}
    .stat-rank{width:24px;font-weight:800;color:var(--txt2)}
    .stat-big{display:flex;gap:10px;flex-wrap:wrap}
    .stat-box{flex:1;min-width:90px;background:var(--bg);border-radius:10px;padding:12px;text-align:center}
    .stat-box .v{font-size:24px;font-weight:900}
    .stat-box .l{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
    /* Section label */
    .sec{font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
    /* Match list */
    .match-item{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;border-left:5px solid var(--grn)}
    .match-item:active{transform:scale(.99)}
    .match-item.live-border{border-left-color:var(--rd)}
    .match-item.plan-border{border-left-color:var(--org)}
    .mi-info{flex:1}
    .mi-opp{font-size:16px;font-weight:700}
    .mi-date{font-size:12px;color:var(--txt2);margin-top:2px}
    .mi-score{font-size:28px;font-weight:900;color:var(--blk);font-variant-numeric:tabular-nums}
    .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px}
    .badge-live{background:var(--rdp);color:var(--rd)}
    .badge-done{background:var(--grnp);color:var(--grn2)}
    .badge-plan{background:var(--orgp);color:var(--org2)}
    .badge-type{background:var(--blk2);color:#fff;margin-left:5px}
    /* Scoreboard */
    .scoreboard{background:var(--blk);color:#fff;border-radius:16px;padding:18px;text-align:center;margin-bottom:12px;border-bottom:3px solid var(--org)}
    .sb-teams{display:flex;justify-content:space-between;font-size:12px;opacity:.7;margin-bottom:4px}
    .sb-score{font-size:64px;font-weight:900;line-height:1;letter-spacing:6px;font-variant-numeric:tabular-nums}
    .sb-score .us{color:var(--grn)}
    .sb-info{font-size:13px;opacity:.7;margin-top:6px}
    /* Timer */
    .timer-card{background:var(--blk2);color:#fff;border-radius:14px;padding:16px;text-align:center;margin-bottom:12px}
    .timer-time{font-size:54px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:3px;line-height:1}
    .timer-lbl{font-size:13px;opacity:.7;margin-top:6px}
    .qdots{display:flex;justify-content:center;gap:8px;margin-top:10px}
    .qdot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.25)}
    .qdot.done{background:var(--org)}
    .qdot.active{background:var(--grn)}
    /* Quarter controls */
    .qctrl{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .qbtn{padding:14px 10px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;min-height:50px}
    .qbtn:active{transform:scale(.96)}
    .qbtn-start{background:var(--grn);color:#fff}
    .qbtn-pause{background:var(--ylp);color:var(--yl)}
    .qbtn-end{background:var(--rdp);color:var(--rd)}
    .qbtn-resume{background:var(--blp);color:var(--bl)}
    .qbtn:disabled{opacity:.35;pointer-events:none}
    /* Event buttons */
    .evtbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px}
    .evtbtn{border:2px solid var(--bdr);border-radius:12px;padding:12px 4px;text-align:center;cursor:pointer;background:var(--card);transition:transform .1s}
    .evtbtn:active{transform:scale(.93)}
    .evtbtn .ei{font-size:26px;display:block;margin-bottom:3px}
    .evtbtn .el{font-size:11px;font-weight:700;color:var(--txt2)}
    .evtbtn.eg{border-color:var(--grnb);background:var(--grnp)}
    .evtbtn.ec{border-color:var(--orgb);background:var(--orgp)}
    .evtbtn.es{border-color:#bcd0ee;background:var(--blp)}
    .evtbtn.eyel{border-color:#fde047;background:var(--ylp)}
    .evtbtn.ered{border-color:#fca5a5;background:var(--rdp)}
    .evtbtn.epen{border-color:var(--grnb);background:#fff}
    .evtbtn.efk{border-color:var(--bdr);background:#fff}
    .evtbtn.disabled{opacity:.35;pointer-events:none}
    /* Player row */
    .pn-inp{width:40px;height:34px;border:2px solid var(--bdr);border-radius:8px;font-size:14px;font-weight:700;text-align:center;padding:0 2px;-webkit-appearance:none;background:#fff;flex-shrink:0;color:var(--txt)}
    .prow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr)}
    .prow:last-child{border-bottom:none}
    .pnum{width:34px;height:34px;border-radius:50%;background:var(--blk);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
    .pnum-off{background:#9ca3af}
    .pname{font-weight:600;font-size:15px}
    .ppos{font-size:12px;color:var(--txt2)}
    .pmins{margin-left:auto;font-size:13px;color:var(--txt2);font-weight:600;white-space:nowrap}
    .pedit{margin-left:8px;background:var(--grnp);border:none;color:var(--grn2);width:34px;height:34px;border-radius:8px;font-size:15px;cursor:pointer}
    /* Event log */
    .elog{list-style:none}
    .elog li{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);font-size:14px}
    .elog li:last-child{border-bottom:none}
    .emin{font-weight:800;color:var(--txt2);font-size:12px;min-width:42px}
    .etxt{flex:1}
    /* Modal */
    .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end}
    .modal{background:#fff;border-radius:22px 22px 0 0;padding:20px;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
    .modal h3{font-size:18px;font-weight:800;margin-bottom:16px;text-align:center}
    .mopt{display:flex;align-items:center;gap:12px;padding:13px;border-radius:10px;border:2px solid var(--bdr);margin-bottom:8px;cursor:pointer;font-weight:600;font-size:15px;transition:all .15s}
    .mopt:active{transform:scale(.98)}
    .mopt.sel{border-color:var(--grn);background:var(--grnp)}
    .mopt-num{width:38px;height:38px;border-radius:50%;background:var(--blk);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
    .mopt-num-off{background:#9ca3af}
    .mopt-skip{border-style:dashed;justify-content:center;color:var(--txt2)}
    /* Toggle group */
    .tgl{display:flex;border:2px solid var(--bdr);border-radius:8px;overflow:hidden;margin-bottom:14px}
    .tgl button{flex:1;padding:11px;border:none;background:#fff;font-size:14px;font-weight:600;cursor:pointer;color:var(--txt2)}
    .tgl button.act{background:var(--grn);color:#fff}
    /* Live tabs */
    .ltabs{display:flex;background:#fff;border-top:2px solid var(--bdr);position:sticky;bottom:0;z-index:50}
    .ltab{flex:1;padding:11px 6px;text-align:center;cursor:pointer;font-size:11px;font-weight:700;color:var(--txt2);border:none;background:none}
    .ltab.act{color:var(--grn)}
    .ltab .ti{font-size:20px;display:block;margin-bottom:2px}
    /* FAB */
    .fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:24px;width:62px;height:62px;border-radius:31px;background:var(--org);color:#fff;border:none;font-size:30px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:50}
    .fab:active{transform:scale(.9)}
    /* Player input row */
    .pirow{display:grid;grid-template-columns:56px 1fr 1fr auto;gap:6px;align-items:center;margin-bottom:6px}
    .pirow input,.pirow select{padding:10px;border:2px solid var(--bdr);border-radius:8px;font-size:15px;width:100%;-webkit-appearance:none;background:#fff}
    .pirow2{display:grid;grid-template-columns:1fr 70px;gap:6px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}
    .pirow2 select,.pirow2 input{padding:9px;border:2px solid var(--bdr);border-radius:8px;font-size:14px;width:100%;-webkit-appearance:none;background:#fff}
    .delbtn{width:38px;height:38px;border-radius:8px;background:var(--rdp);border:none;color:var(--rd);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    /* Start chip */
    .start-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;border:2px solid var(--bdr);background:#fff;font-size:13px;font-weight:600;cursor:pointer}
    .start-chip.on{background:var(--grn);border-color:var(--grn);color:#fff}
    /* Empty */
    .empty{text-align:center;padding:40px 20px;color:var(--txt2)}
    .empty .ei{font-size:52px;margin-bottom:12px}
    /* Divider */
    hr{border:none;border-top:2px solid var(--bdr);margin:14px 0}
    .danger{border-top:2px solid var(--rdp);padding-top:14px;margin-top:14px}
    .hidden{display:none!important}
    /* Wizard */
    .steps{display:flex;gap:6px;padding:10px 16px 0;max-width:600px;margin:0 auto}
    .step-pill{flex:1;height:6px;border-radius:3px;background:var(--bdr)}
    .step-pill.on{background:var(--grn)}
    .step-pill.done{background:var(--grn2)}
    .wiz-nav{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
    .seg{display:flex;border:2px solid var(--bdr);border-radius:9px;overflow:hidden;flex-shrink:0}
    .seg button{border:none;background:#fff;padding:8px 11px;font-size:13px;font-weight:700;color:var(--txt2);cursor:pointer}
    .seg button.basis{background:var(--grn);color:#fff}
    .seg button.bank{background:var(--org);color:#fff}
    .selrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr)}
    .selrow:last-child{border-bottom:none}
    .selrow .pn{width:30px;height:30px;border-radius:50%;background:var(--blk);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
    .selrow .nm{flex:1;font-size:15px;font-weight:600;line-height:1.15}
    .selrow .nm small{display:block;font-weight:400;color:var(--txt2);font-size:11px}
    .guest-badge{font-size:10px;font-weight:700;background:var(--orgp);color:var(--org2);padding:1px 6px;border-radius:10px;margin-left:6px}
    /* Team list */
    .team-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border-radius:12px;box-shadow:var(--shadow);margin-bottom:10px;cursor:pointer;border-left:5px solid var(--grn)}
    .team-row .tn{flex:1;font-size:16px;font-weight:700}
    .team-row .tc{font-size:12px;color:var(--txt2)}
    /* Placement chips */
    .place-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
    .place-chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;border:2px solid var(--bdr);background:#fff;font-size:13px;font-weight:600;cursor:pointer}
    .place-chip.sel{border-color:var(--org);background:var(--orgp);color:var(--org2)}
    .place-chip .pcn{width:20px;height:20px;border-radius:50%;background:var(--blk);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
    /* Pitch slots */
    .pslot{position:absolute;transform:translate(-50%,-50%);width:38px;height:38px;border-radius:50%;border:2px dashed rgba(255,255,255,.85);background:rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;cursor:pointer}
    .pslot.filled{border-style:solid;background:var(--blk);box-shadow:0 2px 5px rgba(0,0,0,.4)}
    .pslot.filled.gk{background:var(--org)}
    .pslot-lbl{position:absolute;top:38px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:#fff;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.7);max-width:74px;overflow:hidden;text-overflow:ellipsis}
    /* Pitch (visual field) */
    .pitch{position:relative;width:100%;max-width:340px;margin:0 auto;aspect-ratio:2/3;background:linear-gradient(#1c8a46,#23a653);border-radius:12px;border:3px solid #fff;overflow:hidden;box-shadow:var(--shadow)}
    .pitch::before{content:'';position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(255,255,255,.45);pointer-events:none}
    .pitch::after{content:'';position:absolute;top:50%;left:50%;width:60px;height:60px;border:2px solid rgba(255,255,255,.45);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none}
    .pitch-box{position:absolute;left:50%;transform:translateX(-50%);width:46%;height:13%;border:2px solid rgba(255,255,255,.45);border-top:none}
    .pitch-box.top{top:0;border-top:2px solid rgba(255,255,255,.45);border-bottom:none}
    .pdot{position:absolute;transform:translate(-50%,-50%);width:38px;height:38px;border-radius:50%;background:var(--blk);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.4)}
    .pdot-lbl{position:absolute;top:38px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:#fff;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.7);max-width:70px;overflow:hidden;text-overflow:ellipsis}
    .pdot-org{background:var(--org)}
    .field-legend{text-align:center;font-size:11px;color:var(--txt2);margin-top:8px}
    /* Print */
    @media print{
      .ltabs,.fab,.hdr,.no-print{display:none!important}
      body{background:#fff}
      .content{max-width:100%;padding:0}
    }
  </style>
</head>
<body>
<div id="app"></div>
<div id="modal" class="hidden"></div>
<script>
// ===================== CONFIG =====================
const MATCH_TYPES = {
  '3v3':  { field: 3,  lines: ['Doel','Verdediging','Aanval'] },
  '5v5':  { field: 5,  lines: ['Doel','Verdediging','Middenveld','Aanval'] },
  '8v8':  { field: 8,  lines: ['Doel','Verdediging','Middenveld','Aanval'] },
  '11v11':{ field: 11, lines: ['Doel','Verdediging','Middenveld','Aanval'] },
};
const LINE_Y = { 'Doel': 90, 'Verdediging': 68, 'Middenveld': 45, 'Aanval': 22 };

  const q = match.quarters[match.quarters.length - 1];
  const elapsed = getQElapsed(match);
  const durMs = (match.quarterDuration || 0) * 60000;
  const isRunning = q && q.startTime && !q.pausedAt && !q.endTime;
  const overtime = isRunning && durMs && elapsed >= durMs;
  if (isRunning && durMs && elapsed >= durMs && q && !q.alerted) { q.alerted = true; beep(); dbSave(match); }

let statsFilter = 'all';
function setStatsFilter(v) { statsFilter = v; loadStats(); }
async function loadStats() {
  const all = await dbAll();
  const el = document.getElementById('stats-content');
  if (!el) return;
  const teams = [...new Set(all.map(m => m.teamName).filter(Boolean))].sort();
  if (statsFilter !== 'all' && !teams.includes(statsFilter)) statsFilter = 'all';
  const list = statsFilter === 'all' ? all : all.filter(m => m.teamName === statsFilter);
  const filterBar = teams.length ? `<div class="filterbar"><select onchange="setStatsFilter(this.value)">
      <option value="all" ${statsFilter==='all'?'selected':''}>Alle ploegen</option>
      ${teams.map(t => `<option value="${esc(t)}" ${statsFilter===t?'selected':''}>${esc(t)}</option>`).join('')}
    </select></div>` : '';
  if (!list.length) { el.innerHTML = filterBar + `<div class="empty"><div class="ei">📊</div><p>Nog geen wedstrijden.</p></div>`; return; }
  let w = 0, d = 0, l = 0, gf = 0, ga = 0;
  const pl = {};
  const getp = (name, num) => { const k = (name || 'Speler').trim(); return pl[k] || (pl[k] = { name: k, number: num || '', goals: 0, assists: 0, ms: 0, yc: 0, rc: 0, mp: 0 }); };
  for (const m of list) {
    gf += m.scoreUs; ga += m.scoreThem;
    if (m.scoreUs > m.scoreThem) w++; else if (m.scoreUs < m.scoreThem) l++; else d++;
    const mins = calcMinutes(m);
    for (const p of (m.players || [])) { const r = getp(p.name, p.number); const ms = mins[p.id] ? mins[p.id].ms : 0; if (ms > 0) r.mp++; r.ms += ms; }
    for (const e of m.events) {
      if (e.type === 'goal_us' && e.playerId) { getp(pName(m, e.playerId)).goals++; if (e.assistId) getp(pName(m, e.assistId)).assists++; }
      if (e.type === 'yellow_card' && e.playerId) getp(pName(m, e.playerId)).yc++;
      if (e.type === 'red_card' && e.playerId) getp(pName(m, e.playerId)).rc++;
    }
  }
  const players = Object.values(pl);
  const topList = (arr, val, unit) => arr.length ? arr.map((p, i) => `<div class="stat-row"><span class="stat-rank">${i+1}</span><span style="flex:1">${esc(p.name)}</span><span style="font-weight:800">${val(p)}${unit}</span></div>`).join('') : '<p style="color:var(--txt2);font-size:14px">—</p>';
  const scorers = players.filter(p => p.goals > 0).sort((a, b) => b.goals - a.goals).slice(0, 10);
  const assisters = players.filter(p => p.assists > 0).sort((a, b) => b.assists - a.assists).slice(0, 10);
  const minutes = players.filter(p => p.ms > 0).sort((a, b) => b.ms - a.ms).slice(0, 15);
  const carded = players.filter(p => p.yc || p.rc).sort((a, b) => (b.yc + b.rc * 2) - (a.yc + a.rc * 2));
  el.innerHTML = filterBar + `
    <div class="card">
      <div class="stat-big" style="margin-bottom:10px">
        <div class="stat-box"><div class="v">${list.length}</div><div class="l">Gespeeld</div></div>
        <div class="stat-box"><div class="v" style="color:var(--grn)">${w}</div><div class="l">Winst</div></div>
        <div class="stat-box"><div class="v">${d}</div><div class="l">Gelijk</div></div>
        <div class="stat-box"><div class="v" style="color:var(--rd)">${l}</div><div class="l">Verlies</div></div>
      </div>
      <div class="stat-big">
        <div class="stat-box"><div class="v">${gf}</div><div class="l">Doelpunten voor</div></div>
        <div class="stat-box"><div class="v">${ga}</div><div class="l">Doelpunten tegen</div></div>
        <div class="stat-box"><div class="v">${gf-ga>=0?'+':''}${gf-ga}</div><div class="l">Saldo</div></div>
      </div>
    </div>
    <div class="sec">⚽ Topschutters</div><div class="card">${topList(scorers, p => p.goals, '')}</div>
    <div class="sec">🎯 Meeste assists</div><div class="card">${topList(assisters, p => p.assists, '')}</div>
    <div class="sec">⏱ Meeste speelminuten</div><div class="card">${topList(minutes, p => Math.floor(p.ms/60000), "'")}</div>
    ${carded.length ? `<div class="sec">🟨 Kaarten</div><div class="card">${carded.map(p=>`<div class="stat-row"><span style="flex:1">${esc(p.name)}</span><span>${p.yc?'🟨'.repeat(p.yc):''}${p.rc?'🟥'.repeat(p.rc):''}</span></div>`).join('')}</div>` : ''}`;
}

async function exportBackup() {
  const matches = await dbAll();
  const data = { app: 'voetbal', version: 1, exportedAt: Date.now(), matches,
    settings: { clubName: localStorage.getItem('voetbal_club_name'), clubLogo: localStorage.getItem('voetbal_club_logo'),
      teams: localStorage.getItem('voetbal_teams'), lastTeam: localStorage.getItem('voetbal_last_team'),
      rosters: localStorage.getItem('voetbal_rosters'), countdown: localStorage.getItem('voetbal_countdown'),
      theme: localStorage.getItem('voetbal_theme') } };
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `voetbal-backup-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
function importBackup(input) {
  const f = input.files && input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    let data;
    try { data = JSON.parse(e.target.result); } catch (err) { alert('Ongeldig back-upbestand.'); return; }
    if (!data || data.app !== 'voetbal' || !Array.isArray(data.matches)) { alert('Dit lijkt geen geldige voetbal-back-up.'); return; }
    pendingRestore = data;
    openModal(`<h3>Back-up herstellen?</h3>
      <p style="text-align:center;color:var(--txt2);margin-bottom:16px">${data.matches.length} wedstrijden gevonden.<br><b>Alle huidige data op dit toestel wordt vervangen.</b></p>
      <button class="btn btn-red" onclick="doRestore()">⬆ Ja, herstellen</button>
      <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
  };
  reader.readAsText(f);
}
let pendingRestore = null;
async function doRestore() {
  const data = pendingRestore;
  if (!data) return;
  await new Promise((res, rej) => { const tx = db.transaction('matches', 'readwrite'); const st = tx.objectStore('matches'); st.clear(); data.matches.forEach(m => st.put(m)); tx.oncomplete = () => res(); tx.onerror = () => rej(); });
  const s = data.settings || {};
  const setOrDel = (k, v) => { if (v == null) localStorage.removeItem(k); else localStorage.setItem(k, v); };
  setOrDel('voetbal_club_name', s.clubName); setOrDel('voetbal_club_logo', s.clubLogo);
  setOrDel('voetbal_teams', s.teams); setOrDel('voetbal_last_team', s.lastTeam);
  setOrDel('voetbal_rosters', s.rosters); setOrDel('voetbal_countdown', s.countdown);
  setOrDel('voetbal_theme', s.theme);
  localStorage.setItem('voetbal_setup_done', '1');
  closeModal(); match = null; go('home');
  setTimeout(() => alert('Back-up hersteld ✓'), 100);
}
function handleLogoFile(input) {
  const f = input.files && input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const max = 256; let w = img.width, h = img.height;
      const scale = Math.min(1, max / Math.max(w, h));
      w = Math.round(w * scale); h = Math.round(h * scale);
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      pendingLogo = c.toDataURL('image/png');
      pendingTheme = extractPalette(c);
      if (pendingTheme) applyTheme(pendingTheme);
      setLogoPreview(pendingLogo);
    };
    img.onerror = () => alert('Kon deze afbeelding niet laden. Probeer een andere.');
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}
function setLogoPreview(src) {
  const cur = document.getElementById('s-logo-img'); if (!cur) return;
  if (cur.tagName === 'IMG') { cur.src = src; }
  else { const img = document.createElement('img'); img.id = 's-logo-img'; img.src = src; img.alt = 'logo'; cur.replaceWith(img); }
}
function useDefaultLogo() {
  pendingLogo = 'DEFAULT'; pendingTheme = null;
  applyTheme(GENERIC_THEME);
  setLogoPreview('logo-default.svg');
}
function saveSettings(isFirst) {
  const name = (document.getElementById('s-name').value || '').trim();
  if (!name) { alert('Geef de naam van je club of ploeg in.'); return; }
  if (pendingLogo === null) { alert('Kies een logo: laad er een op of kies het standaardlogo.'); return; }
  localStorage.setItem('voetbal_club_name', name);
  if (pendingLogo === 'DEFAULT') { localStorage.setItem('voetbal_club_logo', 'logo-default.svg'); localStorage.removeItem('voetbal_theme'); }
  else {
    try { localStorage.setItem('voetbal_club_logo', pendingLogo); } catch (e) { alert('Het logo is te groot om te bewaren. Probeer een kleinere afbeelding.'); return; }
    if (pendingTheme) localStorage.setItem('voetbal_theme', JSON.stringify(pendingTheme)); else localStorage.removeItem('voetbal_theme');
  }
  localStorage.setItem('voetbal_setup_done', '1');
  applyStoredTheme();
  go('home');
}

function fieldSizeW() { return MATCH_TYPES[wiz.matchType].field; }
function basisCount() { return wiz.pool.filter(p => p.sel === 'basis').length; }
function bankCount() { return wiz.pool.filter(p => p.sel === 'bank').length; }
function wizTypeChange() { wiz.matchType = document.getElementById('n-type').value; wiz.formationIndex = 0; wiz.pool.forEach(p => p.slot = null); }

function renderNew() {

function wizStep1() {

function captureStep1() {
  const v = id => { const e = document.getElementById(id); return e ? e.value : ''; };
  const ts = document.getElementById('n-team-sel'); if (ts) wiz.teamId = ts.value;
  wiz.opponent = (v('n-opp') || '').trim();
  wiz.date = v('n-date'); wiz.time = v('n-time');
  wiz.matchType = v('n-type') || wiz.matchType;
  wiz.periodKey = v('n-pt') || wiz.periodKey; wiz.quarterDuration = parseInt(v('n-qd')) || wiz.quarterDuration;
  wiz.competition = v('n-comp'); wiz.matchday = (v('n-md') || '').trim(); wiz.referee = (v('n-ref') || '').trim();
  wiz.jersey = (v('n-jersey') || '').trim(); wiz.weather = (v('n-weather') || '').trim();
  const trainerSel = document.getElementById('n-trainer-sel');
  if (trainerSel) { wiz.trainerIsOther = trainerSel.value === '_other'; if (!wiz.trainerIsOther) wiz.trainer = trainerSel.value; }
  const trainerOther = document.getElementById('n-trainer-other');
  if (wiz.trainerIsOther && trainerOther) wiz.trainer = trainerOther.value.trim();
  wiz.responsible = (v('n-responsible') || '').trim();
}
function buildPool() {
  const team = teamById(wiz.teamId);
  const guests = wiz.pool.filter(p => p.guest);
  const own = (team ? team.players : []).map(p => ({ pid: uid(), srcId: p.id, name: p.name, number: p.number || '', pos: p.pos || '', fromName: team.name, guest: false, sel: 'none', slot: null }));
  wiz.pool = own.concat(guests);
}
function wizBack() { if (wiz.step > 1) { wiz.step--; render(); } }
function wizNext() {
  if (wiz.step === 1) {
    captureStep1();
    if (!wiz.teamId) { alert('Kies of maak eerst een ploeg aan.'); return; }
    if (!wiz.opponent) { alert('Vul de tegenstander in.'); return; }
    if (wiz.poolTeamId !== wiz.teamId) { buildPool(); wiz.poolTeamId = wiz.teamId; }
    wiz.step = 2; render();
  } else if (wiz.step === 2) {
    if (basisCount() !== fieldSizeW()) { alert(`Kies exact ${fieldSizeW()} basisspelers (nu ${basisCount()}).`); return; }
    wiz.step = 3; render();
  }
}
// ----- Stap 2: selectie -----
function setSel(pid, val) {
  const p = wiz.pool.find(x => x.pid === pid); if (!p) return;
  p.sel = (p.sel === val) ? 'none' : val;
  if (p.sel !== 'basis') p.slot = null;
  render();
}
function selRow(p) {
  return `<div class="selrow">
    <input type="number" class="pn-inp" value="${esc(p.number)}" placeholder="?" onchange="setPoolNum('${p.pid}',this.value)" inputmode="numeric" aria-label="Rugnummer">

      <button class="${p.sel==='basis'?'basis':''}" onclick="setSel('${p.pid}','basis')">Basis</button>
      <button class="${p.sel==='bank'?'bank':''}" onclick="setSel('${p.pid}','bank')">Bank</button>
    </div></div>`;
}
function setPoolNum(pid, val) { const p = wiz.pool.find(x => x.pid === pid); if (p) p.number = val; }
function wizStep2() {
  const own = wiz.pool.filter(p => !p.guest), guests = wiz.pool.filter(p => p.guest);

      <div style="flex:1"><div style="font-size:22px;font-weight:900">${bankCount()}</div><div style="font-size:11px;color:var(--txt2)">BANK</div></div>
    </div>
    <div class="sec">${esc(team ? team.name : 'Ploeg')}</div>
    <div class="card">${own.length ? own.map(selRow).join('') : '<p style="color:var(--txt2);font-size:14px">Deze ploeg heeft nog geen spelers. Voeg ze toe via 👥 Ploegen.</p>'}</div>
    ${guests.length ? `<div class="sec">Gastspelers</div><div class="card">${guests.map(selRow).join('')}</div>` : ''}
    <button class="btn btn-orgpale" onclick="addGuestsModal()">+ Speler van andere ploeg</button>

      <button class="btn btn-green" onclick="wizNext()">Volgende →</button>

}
// ----- Gastspelers -----
let guestModalTeam = null, guestPick = [];
function addGuestsModal() {
  const teams = getTeamsV2().filter(t => t.id !== wiz.teamId);
  if (!teams.length) { alert('Er zijn geen andere ploegen om uit te kiezen.'); return; }
  guestModalTeam = teams[0].id; guestPick = [];
  openModal(`<h3>Gastspelers toevoegen</h3>
    <div class="fg"><label>Ploeg</label><select onchange="guestModalTeam=this.value;guestPick=[];document.getElementById('guest-list').innerHTML=guestListHtml()">${teams.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select></div>
    <div id="guest-list">${guestListHtml()}</div>
    <button class="btn btn-green" style="margin-top:12px" onclick="confirmGuests()">✓ Toevoegen</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
function guestListHtml() {
  const t = teamById(guestModalTeam); if (!t) return '';
  const existing = wiz.pool.map(p => p.srcId);
  if (!t.players.length) return '<p style="color:var(--txt2);font-size:14px">Deze ploeg heeft geen spelers.</p>';
  return t.players.map(p => { const already = existing.includes(p.id);
    return `<div class="selrow"><div class="pn">${p.number || '?'}</div><div class="nm">${esc(p.name)}${already ? '<small>al in selectie</small>' : ''}</div>
      <input type="checkbox" ${already ? 'disabled' : ''} onchange="toggleGuest('${p.id}')" style="width:22px;height:22px"></div>`; }).join('');
}
function toggleGuest(srcId) { const i = guestPick.indexOf(srcId); if (i >= 0) guestPick.splice(i, 1); else guestPick.push(srcId); }
function confirmGuests() {
  const t = teamById(guestModalTeam);
  guestPick.forEach(srcId => { const p = t.players.find(x => x.id === srcId); if (p && !wiz.pool.some(pp => pp.srcId === srcId)) wiz.pool.push({ pid: uid(), srcId: p.id, name: p.name, number: p.number || '', pos: p.pos || '', fromName: t.name, guest: true, sel: 'bank', slot: null }); });
  guestPick = []; closeModal(); render();
}
// ----- Stap 3: opstelling -----
function setFormation(idx) { wiz.formationIndex = parseInt(idx); wiz.pool.forEach(p => p.slot = null); wiz.selPlace = null; render(); }
function selectPlace(pid) { wiz.selPlace = (wiz.selPlace === pid) ? null : pid; render(); }
function placeSlot(i) {
  const occupied = wiz.pool.find(p => p.sel === 'basis' && p.slot === i);
  if (wiz.selPlace) {
    const sp = wiz.pool.find(p => p.pid === wiz.selPlace);
    if (sp) { if (occupied && occupied !== sp) occupied.slot = null; sp.slot = i; wiz.selPlace = null; }
  } else if (occupied) { occupied.slot = null; }
  render();
}
function autoPlace() {
  const form = FORMATIONS[wiz.matchType][wiz.formationIndex];
  const basis = wiz.pool.filter(p => p.sel === 'basis');
  basis.forEach(p => p.slot = null);
  const used = {};
  form.slots.forEach((s, i) => { const c = basis.find(p => p.slot == null && !used[p.pid] && p.pos === s.line); if (c) { c.slot = i; used[c.pid] = 1; } });
  form.slots.forEach((s, i) => { if (basis.some(p => p.slot === i)) return; const c = basis.find(p => p.slot == null && !used[p.pid]); if (c) { c.slot = i; used[c.pid] = 1; } });
  wiz.selPlace = null; render();
}
function clearPlacement() { wiz.pool.forEach(p => p.slot = null); wiz.selPlace = null; render(); }
function wizPitch(form) {
  const slots = form.slots.map((s, i) => {
    const p = wiz.pool.find(pp => pp.sel === 'basis' && pp.slot === i);
    if (p) return `<div class="pslot filled ${s.line==='Doel'?'gk':''}" style="left:${s.x}%;top:${s.y}%" onclick="placeSlot(${i})">${p.number || '?'}<span class="pslot-lbl">${esc(p.name)}</span></div>`;
    return `<div class="pslot" style="left:${s.x}%;top:${s.y}%" onclick="placeSlot(${i})">${LINE_SHORT[s.line] || ''}</div>`;
  }).join('');
  return `<div class="pitch"><div class="pitch-box top"></div><div class="pitch-box" style="bottom:0"></div>${slots}</div>`;
}
function wizStep3() {
  const forms = FORMATIONS[wiz.matchType] || [];
  const form = forms[wiz.formationIndex] || forms[0];
  const unplaced = wiz.pool.filter(p => p.sel === 'basis' && p.slot == null);
  return `
    <div class="fg"><label>Formatie</label>
      <select onchange="setFormation(this.value)">${forms.map((f, i) => `<option value="${i}" ${i===wiz.formationIndex?'selected':''}>${f.name}</option>`).join('')}</select></div>
    <div class="card">${wizPitch(form)}
      <div class="field-legend">Tik een speler hieronder, tik dan een plaats. Tik een bezette plaats om weg te halen.</div>
    </div>
    <div class="sec">Nog te plaatsen (${unplaced.length})</div>
    <div class="place-chips">${unplaced.length ? unplaced.map(p => `<span class="place-chip ${wiz.selPlace===p.pid?'sel':''}" onclick="selectPlace('${p.pid}')"><span class="pcn">${p.number || '?'}</span>${esc(p.name)}</span>`).join('') : '<span style="color:var(--grn);font-weight:700;font-size:14px">✓ Iedereen geplaatst</span>'}</div>
    <div class="wiz-nav" style="margin-top:14px">
      <button class="btn btn-gray btn-sm" style="width:auto" onclick="autoPlace()">✨ Auto-plaats</button>
      <button class="btn btn-gray btn-sm" style="width:auto" onclick="clearPlacement()">↺ Wissen</button>
    </div>
    <div class="wiz-nav">
      <button class="btn btn-gray" onclick="wizBack()">← Vorige</button>
      <button class="btn btn-green" onclick="finishWizard(true)">⚽ ${wiz.editId?'Opslaan & starten':'Nu starten'}</button>
    </div>
    <button class="btn btn-orgpale" onclick="finishWizard(false)" style="margin-top:8px">🗓 ${wiz.editId?'Opslaan (gepland)':'Plannen voor later'}</button>`;
}
async function finishWizard(startNow) {
  const form = FORMATIONS[wiz.matchType][wiz.formationIndex];
  const unplaced = wiz.pool.filter(p => p.sel === 'basis' && p.slot == null);
  if (unplaced.length) { alert(`Plaats nog ${unplaced.length} speler(s) op het veld.`); return; }
  const team = teamById(wiz.teamId);
  const starters = wiz.pool.filter(p => p.sel === 'basis').map(p => { const s = form.slots[p.slot]; return { id: uid(), name: p.name || 'Speler', number: p.number || '', line: s.line, posNum: '', starting: true, onField: true, x: s.x, y: s.y }; });
  const bench = wiz.pool.filter(p => p.sel === 'bank').map(p => ({ id: uid(), name: p.name || 'Speler', number: p.number || '', line: p.pos || 'Middenveld', posNum: '', starting: false, onField: false }));
  const common = {
    teamName: team ? team.name : (wiz.teamNameFallback || 'Ploeg'), formation: form.name,
    competition: wiz.competition, matchday: wiz.matchday, referee: wiz.referee, jersey: wiz.jersey, weather: wiz.weather,
    trainer: wiz.trainer || '', responsible: wiz.responsible || '',
    opponent: wiz.opponent, date: wiz.date, time: wiz.time, location: wiz.location,
    matchType: wiz.matchType, fieldSize: MATCH_TYPES[wiz.matchType].field,
    periodKey: wiz.periodKey, numQuarters: PERIOD_TYPES[wiz.periodKey].count, quarterDuration: wiz.quarterDuration,
    players: starters.concat(bench),
  };
  let m;
  if (wiz.editId) {
    const existing = await dbGet(wiz.editId);
    m = Object.assign(existing || {}, common);
    m.status = startNow ? 'live' : (m.status === 'live' ? 'live' : 'planned');
    m.captainId = null; m.motmId = null; // spelers kregen nieuwe id's
  } else {
    m = Object.assign({ id: uid(), createdAt: Date.now(), notes: '', motmId: null, captainId: null, quarters: [], currentQuarter: 0, quarterStatus: 'not_started', scoreUs: 0, scoreThem: 0, events: [] }, common);
    m.status = startNow ? 'live' : 'planned';
  }
  wiz = null; await dbSave(m); match = m;
  await go(startNow ? 'live' : 'prep', m.id);
}
// Een geplande wedstrijd opnieuw in de wizard openen om te bewerken.
function editMatchWizard(m) {
  const team = getTeamsV2().find(t => t.name === m.teamName);
  const fi = Math.max(0, (FORMATIONS[m.matchType] || []).findIndex(f => f.name === m.formation));
  wiz = {
    step: 1, editId: m.id, editStatus: m.status, teamNameFallback: m.teamName,
    teamId: team ? team.id : '', opponent: m.opponent, date: m.date, time: m.time, location: m.location,
    matchType: m.matchType, periodKey: m.periodKey, quarterDuration: m.quarterDuration,
    competition: m.competition || 'Competitie', matchday: m.matchday || '', referee: m.referee || '', jersey: m.jersey || '', weather: m.weather || '',
    trainer: m.trainer || '', responsible: m.responsible || '', trainerIsOther: false,
    pool: m.players.map(p => ({ pid: uid(), srcId: null, name: p.name, number: p.number || '', pos: p.line || '', fromName: m.teamName, guest: false, sel: p.starting ? 'basis' : 'bank', slot: null, _x: p.x, _y: p.y })),
    formationIndex: fi, selPlace: null,
  };
  wiz.poolTeamId = wiz.teamId; // niet opnieuw opbouwen, behoud de selectie
  const form = FORMATIONS[m.matchType][fi];
  wiz.pool.filter(p => p.sel === 'basis').forEach(p => { const idx = form.slots.findIndex(s => s.x === p._x && s.y === p._y); p.slot = idx >= 0 ? idx : null; });
  go('new');
}

  return `
  <div class="hdr"><button class="back" onclick="go('home')">‹</button>
    <div><h1>${esc(tName(m))} vs ${esc(m.opponent)}</h1><div class="hdr-sub">🗓 Gepland · ${m.location} · ${matchWhen(m)} · ${m.matchType}</div></div>
  </div>
  <div class="content">

async function startPlanned() { match.status = 'live'; await dbSave(match); await go('live', match.id); }

function addPlayerToMatch() {
  const lines = MATCH_TYPES[match.matchType].lines;

function removePlayer(id) {

// ===================== LIVE MATCH =====================
function renderLive() {
  if (!match) return '<div class="content"><p>Geen wedstrijd.</p></div>';
  const q = match.quarters[match.quarters.length - 1];
  const isRunning = q && q.startTime && !q.pausedAt && !q.endTime;
  const isPaused = q && q.pausedAt;
  const isBetween = match.quarterStatus === 'between';
  const isDone = match.status === 'done';
  const qNum = match.currentQuarter;
  const canStartFirst = !isDone && qNum === 0;
  const canStartNext = !isDone && isBetween && qNum < match.numQuarters;
  const isLastPeriod = qNum >= match.numQuarters;
  const canEvent = (isRunning || isPaused) && !isDone;
  const dis = canEvent ? '' : 'disabled';
  const completed = (isBetween || isDone) ? qNum : qNum - 1;
  const dots = Array.from({length: match.numQuarters}, (_,i) => {
    const cls = i < completed ? 'done' : (i === qNum-1 && !isBetween && !isDone && qNum > 0 ? 'active' : '');
    return `<div class="qdot ${cls}"></div>`;
  }).join('');

  let tabContent = '';
  if (tab === 'wedstrijd') {
    tabContent = `
      <div class="scoreboard">
        <div class="sb-teams"><span>${esc(tName(match))}</span><span>${esc(match.opponent)}</span></div>
        <div class="sb-score"><span class="us">${match.scoreUs}</span> – ${match.scoreThem}</div>
        <div class="sb-info">${isDone ? '✅ Afgelopen' : (isBetween ? `⏸ Pauze · klaar voor ${pSingLow(match)} ${qNum+1}` : (qNum > 0 ? `${pSing(match)} ${qNum} van ${match.numQuarters} · ${match.matchType}` : `${match.matchType} · nog niet gestart`))}</div>
      </div>
      <div class="timer-card">
        <div class="timer-time" id="timer-time">${timerText(match)}</div>
        <div class="timer-lbl" id="timer-lbl">Totale speeltijd: ${fmtTime(getGameTimeMs(match))}</div>
        <div class="qdots">${dots}</div>
        <div style="margin-top:10px"><span class="start-chip ${countdownOn()?'on':''}" onclick="toggleCountdown()" style="font-size:12px;padding:5px 12px">⏱ ${countdownOn()?'Aftellen':'Optellen'}</span></div>
      </div>
      ${!isDone ? `<div class="qctrl">
        ${canStartFirst ? `<button class="qbtn qbtn-start" onclick="startQuarter()" style="grid-column:1/-1">▶ Start wedstrijd</button>` : ''}
        ${canStartNext ? `<button class="qbtn qbtn-start" onclick="startQuarter()" style="grid-column:1/-1">▶ Start ${pSingLow(match)} ${qNum+1}</button>` : ''}
        ${isRunning ? `<button class="qbtn qbtn-pause" onclick="pauseQuarter()">⏸ Pauze</button>` : ''}
        ${isPaused ? `<button class="qbtn qbtn-resume" onclick="resumeQuarter()">▶ Hervatten</button>` : ''}
        ${(isRunning||isPaused) ? (isLastPeriod
            ? `<button class="qbtn qbtn-end" onclick="endMatch()">🏁 Einde match</button>`
            : `<button class="qbtn qbtn-end" onclick="endPeriod()">⏹ Einde ${pSingLow(match)} ${qNum}</button>`) : ''}
      </div>` : ''}
      <div class="evtbtns">
        <div class="evtbtn eg ${dis}" onclick="modalGoal()"><span class="ei">⚽</span><span class="el">Goal</span></div>
        <div class="evtbtn ec ${dis}" onclick="modalCorner()"><span class="ei">🚩</span><span class="el">Hoekschop</span></div>
        <div class="evtbtn es ${dis}" onclick="modalSub()"><span class="ei">🔄</span><span class="el">Wissel</span></div>
        <div class="evtbtn eyel ${dis}" onclick="modalCard('yellow')"><span class="ei">🟨</span><span class="el">Gele kaart</span></div>
        <div class="evtbtn ered ${dis}" onclick="modalCard('red')"><span class="ei">🟥</span><span class="el">Rode kaart</span></div>
        <div class="evtbtn epen ${dis}" onclick="modalPenalty()"><span class="ei">🎯</span><span class="el">Penalty</span></div>
        <div class="evtbtn efk ${dis}" onclick="modalFreekick()"><span class="ei">⚡</span><span class="el">Vrije trap</span></div>
      </div>
      ${(canEvent && hasUndo()) ? `<button class="btn btn-orgpale" onclick="undoLast()">↩ Laatste actie ongedaan maken</button>` : ''}
      ${isDone ? `<button class="btn btn-pale" onclick="go('detail','${match.id}')">📊 Wedstrijd bekijken</button>` : ''}`;
  } else if (tab === 'opstelling') {
    const on = playersOnField(match), off = playersOnBench(match), mins = calcMinutes(match);
    tabContent = `
      <div class="card">${renderPitch(match, on)}</div>
      <div class="card">
        <div class="sec" style="margin-top:0">Op het veld (${on.length})</div>
        ${on.length ? on.map(p => playerRowHtml(p, mins[p.id])).join('') : '<p style="color:var(--txt2);font-size:14px">Niemand op het veld.</p>'}
        ${off.length ? `<hr><div class="sec">Bank (${off.length})</div>${off.map(p => playerRowHtml(p, mins[p.id], true)).join('')}` : ''}
      </div>
      <button class="btn btn-orgpale" onclick="modalEditPlayers()">✏️ Spelers bewerken</button>`;
  } else {
    const evts = [...match.events].reverse();
    tabContent = (evts.length
      ? `<div class="card"><ul class="elog">${evts.map(e => `<li><span class="emin">${pAbbr(match)}${e.quarterNum||'?'} ${gameMin(e.gameTimeMs)}'</span><span class="etxt">${evtLabel(e, match)}</span>${e.type.startsWith('quarter')?'':`<button class="evt-del" onclick="confirmDeleteEvent('${e.id}')" title="Verwijderen">×</button>`}</li>`).join('')}</ul></div>`
      : `<div class="empty"><div class="ei">📋</div><p>Nog geen events.</p></div>`)
      + `<button class="btn btn-pale" style="margin-top:4px" onclick="modalEditMatchInfo()">📋 Wedstrijdinfo bewerken</button>`;
  }

  return `
  <div class="hdr"><button class="back" onclick="confirmLeave()">‹</button>
    <div><h1>${esc(tName(match))} vs ${esc(match.opponent)}</h1><div class="hdr-sub">${match.location} · ${matchWhen(match)} · ${match.matchType}</div></div>
    ${!isDone ? `<button class="hdr-btn" onclick="endMatch()">Afsluiten</button>` : ''}
  </div>
  <div class="content">${tabContent}</div>
  <div class="ltabs">
    <button class="ltab ${tab==='wedstrijd'?'act':''}" onclick="setTab('wedstrijd')"><span class="ti">⚽</span>Wedstrijd</button>
    <button class="ltab ${tab==='opstelling'?'act':''}" onclick="setTab('opstelling')"><span class="ti">👥</span>Opstelling</button>
    <button class="ltab ${tab==='log'?'act':''}" onclick="setTab('log')"><span class="ti">📋</span>Log</button>
  </div>`;
}

function playerRowHtml(p, minsData, isOff=false) {
  const m = minsData ? Math.floor(minsData.ms / 60000) : 0;
  const cap = (match && match.captainId === p.id) ? ' <b style="color:var(--org)">©</b>' : '';
  const motm = (match && match.motmId === p.id) ? ' ⭐' : '';
  return `<div class="prow">
    <div class="pnum ${isOff?'pnum-off':''}">${p.number||'?'}</div>
    <div style="flex:1"><div class="pname">${esc(p.name)}${cap}${motm}</div><div class="ppos">${p.line}${p.posNum?' · pos '+p.posNum:''}${p.note?' · '+esc(p.note):''}</div></div>
    <div class="pmins">${m}' gespeeld</div>
  </div>`;
}
function setTab(t) { tab = t; render(); if (t==='wedstrijd') startTimer(); else stopTimer(); }
function confirmLeave() {
  if (match && match.status === 'live') {
    openModal(`<h3>Wedstrijd verlaten?</h3>
      <p style="text-align:center;color:var(--txt2);margin-bottom:16px">De wedstrijd loopt nog. Je kan later terugkomen.</p>
      <button class="btn btn-pale" onclick="closeModal();go('home')">✓ Terug naar overzicht</button>
      <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
  } else go('home');
}

// ===================== QUARTER CONTROLS =====================
async function startQuarter() {
  match.currentQuarter++;
  match.quarterStatus = 'running';
  match.quarters.push({ num: match.currentQuarter, startTime: Date.now(), endTime: null, totalPaused: 0, pausedAt: null });
  addEvent('quarter_start');
  requestWake();
  await dbSave(match); startTimer(); render();
}
async function pauseQuarter() {
  const q = match.quarters[match.quarters.length - 1];
  q.pausedAt = Date.now(); match.quarterStatus = 'paused';
  releaseWake();
  await dbSave(match); render();
}
async function resumeQuarter() {
  const q = match.quarters[match.quarters.length - 1];
  q.totalPaused = (q.totalPaused || 0) + (Date.now() - q.pausedAt); q.pausedAt = null;
  match.quarterStatus = 'running';
  requestWake();
  await dbSave(match); startTimer(); render();
}
// Beëindig het huidige deel handmatig -> pauze tussen de delen (klok staat stil tot de volgende start).
async function endPeriod() {
  const q = match.quarters[match.quarters.length - 1];
  if (!q) return;
  if (q.pausedAt) { q.totalPaused = (q.totalPaused || 0) + (Date.now() - q.pausedAt); q.pausedAt = null; }
  q.endTime = Date.now();
  addEvent('quarter_end');
  match.quarterStatus = 'between';
  stopTimer(); releaseWake(); await dbSave(match); render();
}
function endMatch() {
  openModal(`<h3>Wedstrijd afsluiten?</h3>
    <div class="fg"><label>Notities (optioneel)</label>
      <textarea id="end-notes" rows="4" placeholder="Aanvullingen over de wedstrijd, bv. weer, blessures, opmerkingen...">${esc(match.notes||'')}</textarea></div>
    <button class="btn btn-red" onclick="confirmEndMatch()">🏁 Afsluiten &amp; opslaan</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
async function confirmEndMatch() {
  const t = document.getElementById('end-notes');
  if (t) match.notes = t.value;
  closeModal(); await forceEndMatch();
}
function modalNotes() {
  openModal(`<h3>📝 Notities</h3>
    <div class="fg"><textarea id="note-area" rows="6" placeholder="Aanvullingen over de wedstrijd...">${esc(match.notes||'')}</textarea></div>
    <button class="btn btn-green" onclick="saveNotes()">✓ Opslaan</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
function modalEditMatchInfo() {
  openModal(`<h3>✏️ Wedstrijdinfo bewerken</h3>
    <div class="fg"><label>Trainer</label><input id="ei-trainer" type="text" value="${esc(match.trainer||'')}" placeholder="Naam trainer" autocomplete="off"></div>
    <div class="fg"><label>Ploegverantwoordelijke</label><input id="ei-responsible" type="text" value="${esc(match.responsible||'')}" placeholder="Naam" autocomplete="off"></div>
    <div class="fg"><label>Scheidsrechter</label><input id="ei-ref" type="text" value="${esc(match.referee||'')}" placeholder="Naam" autocomplete="off"></div>
    <div class="fg"><label>Soort</label><select id="ei-comp">${['Competitie','Vriendschappelijk','Beker','Tornooi'].map(c=>`<option ${(match.competition||'')=== c?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="fg"><label>Speeldag</label><input id="ei-md" type="text" value="${esc(match.matchday||'')}" placeholder="bv. 5" autocomplete="off"></div>
    <div class="fg"><label>Truitkleur</label><input id="ei-jersey" type="text" value="${esc(match.jersey||'')}" placeholder="bv. zwart-groen" autocomplete="off"></div>
    <div class="fg"><label>Weer / veld</label><input id="ei-weather" type="text" value="${esc(match.weather||'')}" placeholder="bv. droog, kunstgras" autocomplete="off"></div>
    <button class="btn btn-green" onclick="saveMatchInfo()">✓ Opslaan</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
async function saveMatchInfo() {
  const v = id => { const e = document.getElementById(id); return e ? e.value : ''; };
  match.trainer = v('ei-trainer').trim();
  match.responsible = v('ei-responsible').trim();
  match.referee = v('ei-ref').trim();
  match.competition = v('ei-comp');
  match.matchday = v('ei-md').trim();
  match.jersey = v('ei-jersey').trim();
  match.weather = v('ei-weather').trim();
  await dbSave(match); closeModal(); render();
}
async function saveNotes() {
  const t = document.getElementById('note-area');
  if (t) match.notes = t.value;
  await dbSave(match); closeModal(); render();
}
function modalMotm() {
  openModal(`<h3>⭐ Man van de match</h3>
    ${match.players.map(p => `<div class="mopt ${match.motmId===p.id?'sel':''}" onclick="setMotm('${p.id}')"><div class="mopt-num">${p.number||'?'}</div>${esc(p.name)}</div>`).join('')}
    <div class="mopt mopt-skip" onclick="setMotm(null)">Geen / wissen</div>
    <button class="btn btn-gray" style="margin-top:12px" onclick="closeModal()">Sluiten</button>`);
}
async function setMotm(id) { match.motmId = id; await dbSave(match); closeModal(); render(); }
async function shareReport() {
  const m = match;
  const cnt = {};
  m.events.filter(e => e.type === 'goal_us').forEach(e => { const n = pName(m, e.playerId); cnt[n] = (cnt[n] || 0) + 1; });
  const scLine = Object.entries(cnt).map(([n, c]) => c > 1 ? `${n} (${c})` : n).join(', ');
  const lines = [`${tName(m)} ${m.scoreUs}-${m.scoreThem} ${m.opponent}`, `${matchWhen(m)} · ${m.location}${m.competition ? ' · ' + m.competition : ''}`];
  if (scLine) lines.push(`⚽ ${scLine}`);
  if (m.motmId) lines.push(`⭐ Man v/d match: ${pName(m, m.motmId)}`);
  if (m.notes) lines.push('', m.notes);
  lines.push('', `— ${getClubName()}`);
  const text = lines.join('\n');
  if (navigator.share) { try { await navigator.share({ title: `${tName(m)} vs ${m.opponent}`, text }); } catch (e) {} }
  else { try { await navigator.clipboard.writeText(text); alert('Verslag gekopieerd naar klembord ✓'); } catch (e) { alert(text); } }
}
async function forceEndMatch() {
  const q = match.quarters[match.quarters.length - 1];
  if (q && !q.endTime) { if (q.pausedAt) { q.totalPaused=(q.totalPaused||0)+(Date.now()-q.pausedAt); q.pausedAt=null; } q.endTime = Date.now(); }
  match.status = 'done'; match.quarterStatus = 'done';
  stopTimer(); releaseWake(); await dbSave(match); render();
}
function addEvent(type, extra={}) {
  match.events.push({ id: uid(), realTime: Date.now(), gameTimeMs: getGameTimeMs(match), quarterNum: match.currentQuarter, type, ...extra });
}
// Events corrigeren / verwijderen
function confirmDeleteEvent(id) {
  const e = match.events.find(x => x.id === id); if (!e) return;
  openModal(`<h3>Event verwijderen?</h3>
    <p style="text-align:center;color:var(--txt2);margin-bottom:16px">"${evtLabel(e, match)}"<br>De score en opstelling worden herberekend.</p>
    <button class="btn btn-red" onclick="doDeleteEvent('${id}')">🗑 Verwijderen</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
async function doDeleteEvent(id) {
  match.events = match.events.filter(e => e.id !== id);
  recomputeScore(match); recomputeOnField(match);
  await dbSave(match); closeModal(); render();
}
function hasUndo() { return match && match.events.some(e => e.type !== 'quarter_start' && e.type !== 'quarter_end'); }
async function undoLast() {
  let idx = -1;
  for (let i = match.events.length - 1; i >= 0; i--) { const t = match.events[i].type; if (t !== 'quarter_start' && t !== 'quarter_end') { idx = i; break; } }
  if (idx < 0) return;
  match.events.splice(idx, 1);
  recomputeScore(match); recomputeOnField(match);
  await dbSave(match); render();
}

// ===================== MODALS: GOAL (+ assist) =====================
let goalTeam = 'us', goalPlayerId = null, goalAssistId = null;
function modalGoal() {
  const on = playersOnField(match);
  goalTeam = 'us'; goalPlayerId = null; goalAssistId = null;
  openModal(`
    <h3>⚽ Goal</h3>
    <div class="sec" style="margin-top:0">Voor wie?</div>
    <div class="tgl" id="goal-team">
      <button class="act" onclick="tglGoalTeam('us',this)">${esc(tName(match))}</button>
      <button onclick="tglGoalTeam('them',this)">Tegenstander</button>
    </div>
    <div id="goal-detail">
      <div class="sec">Welke speler scoorde?</div>
      <div id="goal-players">
        ${on.map(p=>`<div class="mopt" onclick="selectGoalPlayer('${p.id}',this)"><div class="mopt-num">${p.number||'?'}</div>${esc(p.name)} <span style="color:var(--txt2);font-size:13px">${p.line}</span></div>`).join('')}
        <div class="mopt" onclick="selectGoalPlayer('own',this)"><div class="mopt-num" style="background:var(--rd)">!</div>Eigen doel</div>
      </div>
      <div id="assist-section" class="hidden">
        <div class="sec">Assist door? (optioneel)</div>
        <div id="assist-players">
          ${on.map(p=>`<div class="mopt" onclick="selectAssist('${p.id}',this)"><div class="mopt-num mopt-num-off">${p.number||'?'}</div>${esc(p.name)}</div>`).join('')}
          <div class="mopt mopt-skip" onclick="selectAssist(null,this)">Geen assist</div>
        </div>
      </div>
    </div>
    <button class="btn btn-green" style="margin-top:12px" onclick="confirmGoal()">✓ Bevestigen</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
function tglGoalTeam(team, btn) {
  goalTeam = team; goalPlayerId = null; goalAssistId = null;
  document.querySelectorAll('#goal-team button').forEach(b => b.classList.remove('act'));
  btn.classList.add('act');
  document.getElementById('goal-detail').style.display = team === 'us' ? '' : 'none';
}
function selectGoalPlayer(id, el) {
  goalPlayerId = id; goalAssistId = null;
  document.querySelectorAll('#goal-players .mopt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  const as = document.getElementById('assist-section');
  if (id === 'own') { as.classList.add('hidden'); }
  else { as.classList.remove('hidden'); }
  document.querySelectorAll('#assist-players .mopt').forEach(o => o.classList.remove('sel'));
}
function selectAssist(id, el) {
  goalAssistId = id;
  document.querySelectorAll('#assist-players .mopt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
}
async function confirmGoal() {
  if (goalTeam === 'us' && !goalPlayerId) { alert('Kies een speler.'); return; }
  if (goalTeam === 'us') {
    if (goalPlayerId === 'own') { addEvent('own_goal', { playerId: null }); match.scoreThem++; }
    else { addEvent('goal_us', { playerId: goalPlayerId, assistId: goalAssistId || null }); match.scoreUs++; }
  } else { addEvent('goal_them'); match.scoreThem++; }
  await dbSave(match); closeModal(); render();
}

function modalCorner() {
  openModal(`<h3>🚩 Hoekschop</h3>
    <div class="mopt" onclick="logCorner('us')"><div class="mopt-num">✓</div>Voor ${esc(tName(match))}</div>
    <div class="mopt" onclick="logCorner('them')"><div class="mopt-num mopt-num-off">!</div>Voor tegenstander</div>
    <button class="btn btn-gray" style="margin-top:12px" onclick="closeModal()">Annuleren</button>`);
}
async function logCorner(team) { addEvent(team === 'us' ? 'corner_us' : 'corner_them'); await dbSave(match); closeModal(); render(); }

// ===================== MODAL: SUB =====================
let subOut = null, subIn = null;
function modalSub() {
  const on = playersOnField(match), mins = calcMinutes(match);
  // bank gesorteerd op minst gespeeld, zodat eerlijke rotatie makkelijk is
  const off = playersOnBench(match).slice().sort((a, b) => (mins[a.id]?.ms || 0) - (mins[b.id]?.ms || 0));
  const minMs = off.length ? (mins[off[0].id]?.ms || 0) : 0;
  const mm = id => Math.floor((mins[id]?.ms || 0) / 60000);
  subOut = null; subIn = null;
  openModal(`<h3>🔄 Wissel</h3>
    <div class="sec" style="margin-top:0">Wie gaat ERAF?</div>
    <div id="sub-out">${on.map(p=>`<div class="mopt" onclick="selectSubOut('${p.id}',this)"><div class="mopt-num">${p.number||'?'}</div>${esc(p.name)} <span style="color:var(--txt2);font-size:13px;margin-left:auto">${mm(p.id)}'</span></div>`).join('')}</div>
    <div class="sec">Wie komt ERIN? <span style="color:var(--txt2);font-weight:400;text-transform:none">(minst gespeeld bovenaan)</span></div>
    <div id="sub-in">${off.length ? off.map(p=>{ const low = (mins[p.id]?.ms||0)===minMs; return `<div class="mopt" onclick="selectSubIn('${p.id}',this)"><div class="mopt-num mopt-num-off">${p.number||'?'}</div>${esc(p.name)} ${low?'<span style="color:var(--org);font-size:12px;font-weight:700">💤 minst</span>':''}<span class="${low?'pmins-low':''}" style="color:var(--txt2);font-size:13px;margin-left:auto">${mm(p.id)}'</span></div>`; }).join('') : '<p style="color:var(--txt2);font-size:14px;padding:8px 0">Geen spelers op de bank.</p>'}</div>
    <button class="btn btn-green" style="margin-top:12px" onclick="confirmSub()">✓ Wissel doorvoeren</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
function selectSubOut(id, el) { subOut = id; document.querySelectorAll('#sub-out .mopt').forEach(o => o.classList.remove('sel')); el.classList.add('sel'); }
function selectSubIn(id, el) { subIn = id; document.querySelectorAll('#sub-in .mopt').forEach(o => o.classList.remove('sel')); el.classList.add('sel'); }
async function confirmSub() {
  if (!subOut || !subIn) { alert('Kies wie eraf gaat en wie erin komt.'); return; }
  addEvent('substitution', { playerOutId: subOut, playerInId: subIn });
  const pOut = match.players.find(p => p.id === subOut), pIn = match.players.find(p => p.id === subIn);
  if (pOut) pOut.onField = false;
  if (pIn) { pIn.onField = true; if (pOut) { pIn.x = pOut.x; pIn.y = pOut.y; pIn.line = pOut.line; } }
  await dbSave(match); closeModal(); render();
}

// ===================== MODAL: CARD =====================
function modalCard(color) {
  const on = playersOnField(match);
  const ico = color === 'yellow' ? '🟨' : '🟥';
  const lbl = color === 'yellow' ? 'Gele kaart' : 'Rode kaart';
  openModal(`<h3>${ico} ${lbl}</h3>
    <div class="sec" style="margin-top:0">Voor welke speler?</div>
    ${on.map(p=>`<div class="mopt" onclick="logCard('${color}','${p.id}')"><div class="mopt-num">${p.number||'?'}</div>${esc(p.name)} <span style="color:var(--txt2);font-size:13px">${p.line}</span></div>`).join('')}
    <button class="btn btn-gray" style="margin-top:12px" onclick="closeModal()">Annuleren</button>`);
}
async function logCard(color, pid) {
  if (color === 'red') { addEvent('red_card', { playerId: pid }); const p = match.players.find(x=>x.id===pid); if (p) p.onField = false; }
  else addEvent('yellow_card', { playerId: pid });
  await dbSave(match); closeModal(); render();
}

// ===================== MODAL: PENALTY =====================
let penTeam = 'us';
function modalPenalty() {
  penTeam = 'us';
  openModal(`<h3>🎯 Penalty</h3>
    <div class="sec" style="margin-top:0">Voor wie?</div>
    <div class="tgl" id="pen-team"><button class="act" onclick="tglPen('us',this)">${esc(tName(match))}</button><button onclick="tglPen('them',this)">Tegenstander</button></div>
    <div class="sec">Resultaat?</div>
    <div class="mopt" onclick="logPenalty(true)"><div class="mopt-num">⚽</div>Gescoord</div>
    <div class="mopt" onclick="logPenalty(false)"><div class="mopt-num mopt-num-off">✗</div>Gemist / gestopt</div>
    <button class="btn btn-gray" style="margin-top:12px" onclick="closeModal()">Annuleren</button>`);
}
function tglPen(team, btn){ penTeam = team; document.querySelectorAll('#pen-team button').forEach(b=>b.classList.remove('act')); btn.classList.add('act'); }
async function logPenalty(scored) {
  if (penTeam === 'us') { addEvent('penalty_us', { scored }); if (scored) match.scoreUs++; }
  else { addEvent('penalty_them', { scored }); if (scored) match.scoreThem++; }
  await dbSave(match); closeModal(); render();
}

// ===================== MODAL: FREE KICK =====================
function modalFreekick() {
  openModal(`<h3>⚡ Vrije trap</h3>
    <div class="mopt" onclick="logFreekick('us')"><div class="mopt-num">✓</div>Voor ${esc(tName(match))}</div>
    <div class="mopt" onclick="logFreekick('them')"><div class="mopt-num mopt-num-off">!</div>Voor tegenstander</div>
    <button class="btn btn-gray" style="margin-top:12px" onclick="closeModal()">Annuleren</button>`);
}
async function logFreekick(team) { addEvent(team === 'us' ? 'freekick_us' : 'freekick_them'); await dbSave(match); closeModal(); render(); }

// ===================== DETAIL VIEW =====================
function renderDetail() {
  if (!match) return '<div class="content"><p>Niet gevonden.</p></div>';
  const mins = calcMinutes(match), evts = [...match.events].reverse();
  const qSummary = match.quarters.map(q => {
    const dur = q.endTime ? q.endTime - q.startTime - (q.totalPaused||0) : getQElapsed(match);
    const goals = match.events.filter(e => (e.type==='goal_us'||e.type==='goal_them'||e.type==='own_goal'||(e.type.startsWith('penalty')&&e.scored)) && e.quarterNum === q.num);
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr)">
      <div style="font-weight:800;min-width:32px">${pAbbr(match)}${q.num}</div>
      <div style="flex:1;font-size:13px;color:var(--txt2)">${fmtTime(dur)}</div>
      <div style="font-size:13px;text-align:right">${goals.map(e=>evtLabel(e,match)).join('<br>')||'–'}</div>
    </div>`;
  }).join('');

  return `
  <div class="hdr"><button class="back" onclick="go('home')">‹</button>
    <div><h1>${esc(tName(match))} vs ${esc(match.opponent)}</h1><div class="hdr-sub">${match.location} · ${matchWhen(match)} · ${match.matchType}</div></div>
  </div>
  <div class="content">
    <div class="card" style="text-align:center">
      <div style="font-size:13px;color:var(--txt2);margin-bottom:4px">Eindscore</div>
      <div style="font-size:50px;font-weight:900;color:var(--blk)"><span style="color:var(--grn)">${match.scoreUs}</span> – ${match.scoreThem}</div>
      <div style="font-size:14px;color:var(--txt2)">${esc(tName(match))} – ${esc(match.opponent)}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" class="no-print">
      <button class="btn btn-green" onclick="shareReport()">📤 Delen</button>
      <button class="btn btn-org" onclick="exportPDF()">📄 PDF</button>
    </div>
    <div class="sec">Wedstrijdinfo</div>
    <div class="card">
      ${[['Formatie',match.formation],['Trainer',match.trainer],['Ploegverantwoordelijke',match.responsible],['Soort',match.competition],['Speeldag',match.matchday],['Scheidsrechter',match.referee],['Truitkleur',match.jersey],['Weer / veld',match.weather],['Kapitein',match.captainId?pName(match,match.captainId):'']].filter(([k,v])=>v).map(([k,v])=>`<div class="stat-row"><span style="color:var(--txt2);min-width:120px">${k}</span><span style="font-weight:600">${esc(v)}</span></div>`).join('') || '<p style="color:var(--txt2);font-size:14px">Geen extra info ingevuld.</p>'}
      <div class="stat-row"><span style="color:var(--txt2);min-width:120px">⭐ Man v/d match</span><span style="font-weight:600">${match.motmId?esc(pName(match,match.motmId)):'—'}</span><button class="btn btn-pale btn-sm no-print" style="margin-left:auto;width:auto" onclick="modalMotm()">Kiezen</button></div>
    </div>
    <div class="sec">Notities</div>
    <div class="card">
      <p class="notes-txt" style="${match.notes?'':'color:var(--txt2)'}">${match.notes?esc(match.notes):'Geen notities.'}</p>
      <button class="btn btn-pale btn-sm no-print" style="margin-top:10px" onclick="modalNotes()">✏️ Bewerken</button>
    </div>
    <div class="sec">Opstelling</div>
    <div class="card">${renderPitch(match, match.players.filter(p=>p.starting))}</div>
    ${match.quarters.length ? `<div class="sec">Per ${pSingLow(match)}</div><div class="card">${qSummary}</div>` : ''}
    <div class="sec">Speelminuten</div>
    <div class="card">${match.players.map(p => playerRowHtml(p, mins[p.id], !p.onField)).join('')}</div>
    <div class="sec">Events (${match.events.length})</div>
    <div class="card">${evts.length ? `<ul class="elog">${evts.map(e=>`<li><span class="emin">${pAbbr(match)}${e.quarterNum||'?'} ${gameMin(e.gameTimeMs)}'</span><span class="etxt">${evtLabel(e,match)}</span>${e.type.startsWith('quarter')?'':`<button class="evt-del no-print" onclick="confirmDeleteEvent('${e.id}')" title="Verwijderen">×</button>`}</li>`).join('')}</ul>` : '<p style="color:var(--txt2);font-size:14px">Geen events.</p>'}</div>
    <div class="no-print">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <button class="btn btn-orgpale" onclick="modalEditPlayers()">✏️ Spelers bewerken</button>
        <button class="btn btn-pale" onclick="modalEditMatchInfo()">📋 Info bewerken</button>
      </div>
      <div class="danger"><button class="btn btn-red" onclick="confirmDelete()">🗑 Wedstrijd verwijderen</button></div>
    </div>
  </div>`;
}
function confirmDelete() {
  openModal(`<h3>Wedstrijd verwijderen?</h3>
    <p style="text-align:center;color:var(--txt2);margin-bottom:16px">Dit kan niet ongedaan gemaakt worden.</p>
    <button class="btn btn-red" onclick="deleteCurrentMatch()">🗑 Ja, verwijderen</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
async function deleteCurrentMatch() { await dbDel(match.id); match = null; closeModal(); go('home'); }

// ===================== PDF EXPORT =====================
function exportPDF() {
  const m = match, mins = calcMinutes(m);
  const evts = [...m.events];
  const stat = (type) => m.events.filter(e => e.type === type).length;
  const goals = m.events.filter(e => e.type==='goal_us');
  const scorers = {};
  goals.forEach(e => { const n = pName(m,e.playerId); scorers[n] = (scorers[n]||0)+1; });
  const assists = {};
  goals.forEach(e => { if (e.assistId){ const n = pName(m,e.assistId); assists[n]=(assists[n]||0)+1; } });

  const playerRows = m.players.map(p => {
    const min = mins[p.id] ? Math.floor(mins[p.id].ms/60000) : 0;
    const g = m.events.filter(e=>e.type==='goal_us'&&e.playerId===p.id).length;
    const a = m.events.filter(e=>e.type==='goal_us'&&e.assistId===p.id).length;
    const yc = m.events.filter(e=>e.type==='yellow_card'&&e.playerId===p.id).length;
    const rc = m.events.filter(e=>e.type==='red_card'&&e.playerId===p.id).length;
    return `<tr><td>${p.number||''}</td><td>${esc(p.name)}</td><td>${p.line}${p.posNum?' ('+p.posNum+')':''}</td><td style="text-align:center">${min}'</td><td style="text-align:center">${g||''}</td><td style="text-align:center">${a||''}</td><td style="text-align:center">${yc?'🟨'.repeat(yc):''}${rc?'🟥':''}</td></tr>`;
  }).join('');

  const evtRows = evts.map(e => `<tr><td>${pAbbr(m)}${e.quarterNum||'?'} ${gameMin(e.gameTimeMs)}'</td><td>${evtLabel(e,m)}</td></tr>`).join('');

  const html = `<!DOCTYPE html><html lang="nl"><head><meta charset="utf-8"><title>${esc(tName(m))} vs ${esc(m.opponent)}</title>
    <style>
      body{font-family:Arial,sans-serif;color:#171717;padding:24px;max-width:800px;margin:0 auto}
      .top{display:flex;align-items:center;gap:14px;border-bottom:3px solid #f5821f;padding-bottom:14px;margin-bottom:18px}
      .top .logo{width:54px;height:54px;background:#101010;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#f5821f;font-weight:bold;font-size:20px}
      h1{font-size:20px;margin:0}
      .sub{color:#6b7280;font-size:13px;margin-top:3px}
      .score{text-align:center;font-size:42px;font-weight:900;margin:16px 0}
      .score .us{color:#1f9d4d}
      h2{font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;border-bottom:1px solid #e5e7eb;padding-bottom:5px;margin-top:24px}
      table{width:100%;border-collapse:collapse;font-size:13px}
      th,td{padding:6px 8px;border-bottom:1px solid #eee;text-align:left}
      th{color:#6b7280;font-size:11px;text-transform:uppercase}
      .stats{display:flex;gap:18px;flex-wrap:wrap;font-size:13px}
      .stats div{background:#f5f6f5;padding:8px 14px;border-radius:8px}
      .stats b{color:#1f9d4d}
      @media print{body{padding:0}}
    </style></head><body>
    <div class="top"><img src="${getClubLogo()}" style="width:54px;height:54px;object-fit:contain;border-radius:10px;background:${(JSON.parse(localStorage.getItem('voetbal_theme')||'null')||GENERIC_THEME).dark}">
      <div><h1>${esc(tName(m))} <span style="color:#6b7280;font-weight:400">vs</span> ${esc(m.opponent)}</h1>
      <div class="sub">${matchWhen(m)} · ${m.location} · ${m.matchType} · ${m.numQuarters} ${pPlural(m)} × ${m.quarterDuration} min</div>
      ${[m.formation,m.competition,m.matchday&&('speeldag '+m.matchday),m.referee&&('ref. '+m.referee),m.jersey&&('trui '+m.jersey),m.weather,m.captainId&&('kapitein '+pName(m,m.captainId))].filter(Boolean).length?`<div class="sub">${[m.formation,m.competition,m.matchday&&('speeldag '+m.matchday),m.referee&&('ref. '+m.referee),m.jersey&&('trui '+m.jersey),m.weather,m.captainId&&('kapitein '+pName(m,m.captainId))].filter(Boolean).map(esc).join(' · ')}</div>`:''}</div>
    </div>
    <div class="score"><span class="us">${m.scoreUs}</span> – ${m.scoreThem}</div>
    ${m.motmId?`<p style="text-align:center;font-weight:700;margin:-8px 0 10px">⭐ Man van de match: ${esc(pName(m,m.motmId))}</p>`:''}
    <h2>Wedstrijdstatistieken</h2>
    <div class="stats">
      <div>Hoekschoppen: <b>${stat('corner_us')}</b> – ${stat('corner_them')}</div>
      <div>Vrije trappen: <b>${stat('freekick_us')}</b> – ${stat('freekick_them')}</div>
      <div>Penalty's: <b>${stat('penalty_us')}</b> – ${stat('penalty_them')}</div>
      <div>🟨 ${stat('yellow_card')} · 🟥 ${stat('red_card')}</div>
    </div>
    <h2>Spelers</h2>
    <table><thead><tr><th>#</th><th>Naam</th><th>Positie</th><th>Speeltijd</th><th>Goals</th><th>Assists</th><th>Kaarten</th></tr></thead>
    <tbody>${playerRows}</tbody></table>
    ${m.players.some(p=>p.note) ? `<h2>Notities per speler</h2>${m.players.filter(p=>p.note).map(p=>`<div style="font-size:13px;padding:3px 0"><b>${esc(p.name)}:</b> ${esc(p.note)}</div>`).join('')}` : ''}
    ${m.notes ? `<h2>Notities</h2><p style="white-space:pre-wrap;font-size:13px;line-height:1.5">${esc(m.notes)}</p>` : ''}
    <h2>Volledige tijdlijn (${evts.length} events)</h2>
    <table><tbody>${evtRows||'<tr><td>Geen events</td></tr>'}</tbody></table>
    <p style="margin-top:30px;color:#9ca3af;font-size:11px;text-align:center">${esc(getClubName())} · app created by Tim Buyse</p>
    <script>window.onload=function(){setTimeout(function(){window.print();},300);};<\/script>
    </body></html>`;

  const w = window.open('', '_blank');
  if (!w) { alert('Sta pop-ups toe om de PDF te maken.'); return; }
  w.document.write(html); w.document.close();
}

// ===================== HELPERS =====================
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===================== INIT =====================
async function init() {
  db = await openDB();
  applyStoredTheme();
  migrateTeams();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && view === 'live' && match) {
      const q = match.quarters[match.quarters.length - 1];
      if (q && q.startTime && !q.pausedAt && !q.endTime) requestWake();
    }
  });
  if (!setupDone()) { view = 'setup'; render(); return; }
  const all = await dbAll();
  const live = all.find(m => m.status === 'live');
  if (live) { match = live; view = 'live'; startTimer(); }
  render();
}
views.teams = renderTeamsList;
views.teamEdit = renderTeamEdit;
views.prep = renderPrep;
views.new = renderNew;
function newMatch() { startWizard(); go('new'); }
init();
</script>
