<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sparta Petegem">
  <meta name="theme-color" content="#101010">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Football Score Tracking App</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --blk:#0f172a;--blk2:#1e293b;--blk3:#334155;
      --grn:#2563eb;--grn2:#1d4ed8;--grnp:#e8eefc;--grnb:#c3d4f7;
      --org:#f59e0b;--org2:#d97706;--orgp:#fdf0d9;--orgb:#f8d79a;
      --yl:#eab308;--ylp:#fef9c3;--rd:#dc2626;--rdp:#fee2e2;--bl:#2563eb;--blp:#eff6ff;
      --bg:#f5f6f5;--card:#fff;--txt:#171717;--txt2:#6b7280;--bdr:#e5e7eb;
      --shadow:0 2px 8px rgba(0,0,0,.1)
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;overflow-x:hidden}
    /* Header */
    .hdr{background:var(--blk);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.3);border-bottom:3px solid var(--org)}
    .hdr h1{font-size:17px;font-weight:700;flex:1}
    .hdr-sub{font-size:12px;opacity:.7}
    .back{background:none;border:none;color:#fff;font-size:26px;cursor:pointer;padding:2px 4px;line-height:1}
    .hdr-btn{background:var(--org);border:none;color:#fff;font-size:13px;font-weight:700;padding:7px 13px;border-radius:8px;cursor:pointer}
    .hdr-logo{width:30px;height:30px;border-radius:7px;flex-shrink:0}
    .hdr-home{justify-content:center;padding:10px 16px}
    .hdr-fulllogo{height:44px;width:auto}
    .credit{text-align:center;font-size:12px;color:var(--txt2);padding:4px 0 28px}
    .credit b{color:var(--blk)}
    .hdr-gear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:21px;cursor:pointer;opacity:.85;padding:6px}
    .hdr-crest{height:38px;width:38px;object-fit:contain;border-radius:6px}
    .hdr-clubname{font-size:17px;font-weight:800;color:#fff;margin-left:9px}
    .logo-preview{display:flex;justify-content:center;margin-bottom:10px}
    .logo-preview img{max-height:120px;max-width:85%;object-fit:contain;background:var(--blk);border-radius:12px;padding:12px}
    .logo-empty{height:110px;width:100%;max-width:85%;border:2px dashed var(--bdr);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:14px;font-weight:600}
    .file-btn{display:block;width:100%;padding:13px;border:2px dashed var(--grnb);border-radius:10px;text-align:center;font-size:14px;font-weight:700;color:var(--grn2);cursor:pointer;background:var(--grnp)}
    .file-btn input[type=file]{display:none}
    .welcome{text-align:center;padding:8px 4px 16px}
    .welcome h2{font-size:22px;margin-bottom:6px}
    .welcome p{font-size:14px;color:var(--txt2);line-height:1.5}
    /* Content */
    .content{padding:16px;max-width:600px;margin:0 auto;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
    /* Card */
    .card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:10px;border:none;font-size:16px;font-weight:600;cursor:pointer;min-height:50px;width:100%;transition:opacity .15s,transform .1s}
    .btn:active{transform:scale(.97);opacity:.85}
    .btn-green{background:var(--grn);color:#fff}
    .btn-org{background:var(--org);color:#fff}
    .btn-dark{background:var(--blk);color:#fff}
    .btn-pale{background:var(--grnp);color:var(--grn2)}
    .btn-orgpale{background:var(--orgp);color:var(--org2)}
    .btn-red{background:var(--rdp);color:var(--rd)}
    .btn-gray{background:#f1f1f1;color:var(--txt)}
    .btn-sm{padding:9px 14px;font-size:14px;min-height:38px;width:auto}
    /* Form */
    .fg{margin-bottom:14px}
    .fg label{display:block;font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
    .fg input,.fg select{width:100%;padding:12px;border:2px solid var(--bdr);border-radius:8px;font-size:16px;color:var(--txt);background:#fff;-webkit-appearance:none}
    .fg input:focus,.fg select:focus{outline:none;border-color:var(--grn)}
    .fg textarea{width:100%;padding:12px;border:2px solid var(--bdr);border-radius:8px;font-size:16px;color:var(--txt);font-family:inherit;resize:vertical;-webkit-appearance:none}
    .fg textarea:focus{outline:none;border-color:var(--grn)}
    .chkrow{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:13px;font-weight:600;color:var(--txt2);text-transform:none;letter-spacing:0}
    .chkrow input{width:auto;transform:scale(1.3)}
    .team-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .team-chips-lbl{width:100%;font-size:12px;color:var(--txt2);font-weight:600;text-transform:none;letter-spacing:0;margin-bottom:2px}
    .team-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 5px 6px 12px;border-radius:20px;border:2px solid var(--bdr);background:#fff;font-size:13px;font-weight:600;cursor:pointer}
    .team-chip-x{border:none;background:var(--rdp);color:var(--rd);width:21px;height:21px;border-radius:50%;font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .filterbar{margin-bottom:12px}
    .filterbar select{width:100%;padding:11px;border:2px solid var(--bdr);border-radius:10px;font-size:15px;background:#fff;font-weight:600;color:var(--txt);-webkit-appearance:none}
    .notes-txt{white-space:pre-wrap;font-size:14px;line-height:1.45}
    .more-details{margin-top:6px;border-top:1px solid var(--bdr);padding-top:10px}
    .more-details summary{font-size:13px;font-weight:700;color:var(--grn2);cursor:pointer;list-style:none}
    .more-details summary::-webkit-details-marker{display:none}
    .pmins-low{color:var(--org)!important;font-weight:800}
    .evt-del{margin-left:auto;background:var(--rdp);border:none;color:var(--rd);width:28px;height:28px;border-radius:7px;font-size:15px;cursor:pointer;flex-shrink:0}
    .stat-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr);font-size:14px}
    .stat-row:last-child{border-bottom:none}
    .stat-rank{width:24px;font-weight:800;color:var(--txt2)}
    .stat-big{display:flex;gap:10px;flex-wrap:wrap}
    .stat-box{flex:1;min-width:90px;background:var(--bg);border-radius:10px;padding:12px;text-align:center}
    .stat-box .v{font-size:24px;font-weight:900}
    .stat-box .l{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
    /* Section label */
    .sec{font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
    /* Match list */
    .match-item{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;border-left:5px solid var(--grn)}
    .match-item:active{transform:scale(.99)}
    .match-item.live-border{border-left-color:var(--rd)}
    .match-item.plan-border{border-left-color:var(--org)}
    .mi-info{flex:1}
    .mi-opp{font-size:16px;font-weight:700}
    .mi-date{font-size:12px;color:var(--txt2);margin-top:2px}
    .mi-score{font-size:28px;font-weight:900;color:var(--blk);font-variant-numeric:tabular-nums}
    .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px}
    .badge-live{background:var(--rdp);color:var(--rd)}
    .badge-done{background:var(--grnp);color:var(--grn2)}
    .badge-plan{background:var(--orgp);color:var(--org2)}
    .badge-type{background:var(--blk2);color:#fff;margin-left:5px}
    /* Scoreboard */
    .scoreboard{background:var(--blk);color:#fff;border-radius:16px;padding:18px;text-align:center;margin-bottom:12px;border-bottom:3px solid var(--org)}
    .sb-teams{display:flex;justify-content:space-between;font-size:12px;opacity:.7;margin-bottom:4px}
    .sb-score{font-size:64px;font-weight:900;line-height:1;letter-spacing:6px;font-variant-numeric:tabular-nums}
    .sb-score .us{color:var(--grn)}
    .sb-info{font-size:13px;opacity:.7;margin-top:6px}
    /* Timer */
    .timer-card{background:var(--blk2);color:#fff;border-radius:14px;padding:16px;text-align:center;margin-bottom:12px}
    .timer-time{font-size:54px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:3px;line-height:1}
    .timer-lbl{font-size:13px;opacity:.7;margin-top:6px}
    .qdots{display:flex;justify-content:center;gap:8px;margin-top:10px}
    .qdot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.25)}
    .qdot.done{background:var(--org)}
    .qdot.active{background:var(--grn)}
    /* Quarter controls */
    .qctrl{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .qbtn{padding:14px 10px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;min-height:50px}
    .qbtn:active{transform:scale(.96)}
    .qbtn-start{background:var(--grn);color:#fff}
    .qbtn-pause{background:var(--ylp);color:var(--yl)}
    .qbtn-end{background:var(--rdp);color:var(--rd)}
    .qbtn-resume{background:var(--blp);color:var(--bl)}
    .qbtn:disabled{opacity:.35;pointer-events:none}
    /* Event buttons */
    .evtbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px}
    .evtbtn{border:2px solid var(--bdr);border-radius:12px;padding:12px 4px;text-align:center;cursor:pointer;background:var(--card);transition:transform .1s}
    .evtbtn:active{transform:scale(.93)}
    .evtbtn .ei{font-size:26px;display:block;margin-bottom:3px}
    .evtbtn .el{font-size:11px;font-weight:700;color:var(--txt2)}
    .evtbtn.eg{border-color:var(--grnb);background:var(--grnp)}
    .evtbtn.ec{border-color:var(--orgb);background:var(--orgp)}
    .evtbtn.es{border-color:#bcd0ee;background:var(--blp)}
    .evtbtn.eyel{border-color:#fde047;background:var(--ylp)}
    .evtbtn.ered{border-color:#fca5a5;background:var(--rdp)}
    .evtbtn.epen{border-color:var(--grnb);background:#fff}
    .evtbtn.efk{border-color:var(--bdr);background:#fff}
    .evtbtn.einj{border-color:#d8b4fe;background:#faf5ff}
    .seg button.absent{background:var(--rd);color:#fff}
    .today-banner{background:var(--blk);color:#fff;border-radius:12px;padding:14px 16px;margin-bottom:14px;border-left:5px solid var(--org)}
    .today-banner h3{font-size:14px;font-weight:700;color:var(--org);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
    .today-match{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid rgba(255,255,255,.1)}
    .today-match:first-of-type{padding-top:0;border-top:none}
    .today-match .tm-info{flex:1}
    .today-match .tm-opp{font-size:15px;font-weight:700}
    .today-match .tm-sub{font-size:12px;opacity:.7;margin-top:2px}
    .evtbtn.disabled{opacity:.35;pointer-events:none}
    /* Player row */
    .pn-inp{width:40px;height:34px;border:2px solid var(--bdr);border-radius:8px;font-size:14px;font-weight:700;text-align:center;padding:0 2px;-webkit-appearance:none;background:#fff;flex-shrink:0;color:var(--txt)}
    .prow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr)}
    .prow:last-child{border-bottom:none}
    .pnum{width:34px;height:34px;border-radius:50%;background:var(--blk);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
    .pnum-off{background:#9ca3af}
    .pname{font-weight:600;font-size:15px}
    .ppos{font-size:12px;color:var(--txt2)}
    .pmins{margin-left:auto;font-size:13px;color:var(--txt2);font-weight:600;white-space:nowrap}
    .pedit{margin-left:8px;background:var(--grnp);border:none;color:var(--grn2);width:34px;height:34px;border-radius:8px;font-size:15px;cursor:pointer}
    /* Event log */
    .elog{list-style:none}
    .elog li{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);font-size:14px}
    .elog li:last-child{border-bottom:none}
    .emin{font-weight:800;color:var(--txt2);font-size:12px;min-width:42px}
    .etxt{flex:1}
    /* Event-log gegroepeerd per deel */
    .qgroup{margin-bottom:4px}
    .qgroup-head{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#fff;background:var(--blk2);padding:7px 11px;border-radius:8px;margin:12px 0 2px}
    .qgroup:first-child .qgroup-head{margin-top:0}
    .qgroup-score{font-size:15px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:1px}
    .qgroup-score .us{color:var(--grn)}
    .qgroup .elog li{padding:8px 4px}
    .qgroup-empty{color:var(--txt2);font-size:13px;padding:8px 4px}
    /* Modal */
    .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end}
    .modal{background:#fff;border-radius:22px 22px 0 0;padding:20px;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
    .modal h3{font-size:18px;font-weight:800;margin-bottom:16px;text-align:center}
    .mopt{display:flex;align-items:center;gap:12px;padding:13px;border-radius:10px;border:2px solid var(--bdr);margin-bottom:8px;cursor:pointer;font-weight:600;font-size:15px;transition:all .15s}
    .mopt:active{transform:scale(.98)}
    .mopt.sel{border-color:var(--grn);background:var(--grnp)}
    .mopt-num{width:38px;height:38px;border-radius:50%;background:var(--blk);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
    .mopt-num-off{background:#9ca3af}
    .mopt-skip{border-style:dashed;justify-content:center;color:var(--txt2)}
    /* Toggle group */
    .tgl{display:flex;border:2px solid var(--bdr);border-radius:8px;overflow:hidden;margin-bottom:14px}
    .tgl button{flex:1;padding:11px;border:none;background:#fff;font-size:14px;font-weight:600;cursor:pointer;color:var(--txt2)}
    .tgl button.act{background:var(--grn);color:#fff}
    /* Live tabs */
    .ltabs{display:flex;background:#fff;border-top:2px solid var(--bdr);position:sticky;bottom:0;z-index:50}
    .ltab{flex:1;padding:11px 6px;text-align:center;cursor:pointer;font-size:11px;font-weight:700;color:var(--txt2);border:none;background:none}
    .ltab.act{color:var(--grn)}
    .ltab .ti{font-size:20px;display:block;margin-bottom:2px}
    /* FAB */
    .fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:24px;width:62px;height:62px;border-radius:31px;background:var(--org);color:#fff;border:none;font-size:30px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:50}
    .fab:active{transform:scale(.9)}
    /* Player input row */
    .pirow{display:grid;grid-template-columns:56px 1fr 1fr auto;gap:6px;align-items:center;margin-bottom:6px}
    .pirow input,.pirow select{padding:10px;border:2px solid var(--bdr);border-radius:8px;font-size:15px;width:100%;-webkit-appearance:none;background:#fff}
    .pirow2{display:grid;grid-template-columns:1fr 70px;gap:6px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}
    .pirow2 select,.pirow2 input{padding:9px;border:2px solid var(--bdr);border-radius:8px;font-size:14px;width:100%;-webkit-appearance:none;background:#fff}
    .delbtn{width:38px;height:38px;border-radius:8px;background:var(--rdp);border:none;color:var(--rd);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    /* Start chip */
    .start-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;border:2px solid var(--bdr);background:#fff;font-size:13px;font-weight:600;cursor:pointer}
    .start-chip.on{background:var(--grn);border-color:var(--grn);color:#fff}
    /* Empty */
    .empty{text-align:center;padding:40px 20px;color:var(--txt2)}
    .empty .ei{font-size:52px;margin-bottom:12px}
    /* Divider */
    hr{border:none;border-top:2px solid var(--bdr);margin:14px 0}
    .danger{border-top:2px solid var(--rdp);padding-top:14px;margin-top:14px}
    .hidden{display:none!important}
    /* Donkere modus */
    body.dark{--bg:#0b1220;--card:#161f2e;--txt:#e8eaed;--txt2:#9aa6b2;--bdr:#2a3445}
    body.dark .fg input,body.dark .fg select,body.dark .fg textarea,body.dark .pirow input,body.dark .pirow select,body.dark .pirow2 input,body.dark .pirow2 select,body.dark .pn-inp,body.dark .filterbar select,body.dark .start-chip,body.dark .team-chip,body.dark .place-chip{background:#0f1828;color:var(--txt)}
    body.dark .evtbtn{background:#0f1828}
    body.dark .mopt{background:#0f1828}
    body.dark .credit b{color:var(--txt)}
    body.dark .mi-score{color:var(--txt)}
    /* Back-up-herinnering */
    .backup-banner{background:var(--orgp);color:var(--org2);border:1px solid var(--orgb);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600}
    .backup-banner button{margin-left:auto;flex-shrink:0}
    /* Fair-play / speelminuten */
    .pmins-warn{color:var(--rd)!important;font-weight:800}
    .fairbar{height:6px;border-radius:3px;background:var(--bdr);overflow:hidden;margin-top:4px}
    .fairbar span{display:block;height:100%;background:var(--grn)}
    .fairbar.low span{background:var(--rd)}
    .evt-edit{background:var(--grnp);border:none;color:var(--grn2);width:28px;height:28px;border-radius:7px;font-size:14px;cursor:pointer;flex-shrink:0}
    .searchbar input{width:100%;padding:11px;border:2px solid var(--bdr);border-radius:10px;font-size:15px;background:var(--card);color:var(--txt);-webkit-appearance:none;margin-bottom:10px}
    /* Home dashboard-tegels */
    .home-tiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:8px}
    .tile{background:var(--card);border:none;border-radius:14px;box-shadow:var(--shadow);padding:15px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;color:var(--txt);border-bottom:3px solid var(--grn)}
    .tile:active{transform:scale(.96)}
    .tile .ti{font-size:27px;line-height:1}
    .tile .tl{font-size:13px;font-weight:800}
    .tile .tc{font-size:11px;color:var(--txt2);font-weight:600}
    .tile.tile-org{border-bottom-color:var(--org)}
    .tile.tile-dark{border-bottom-color:var(--blk2)}
    /* Live: speeltijd-nudge + keeperkeuze */
    .nudge{background:var(--orgp);color:var(--org2);border:1px solid var(--orgb);border-radius:12px;padding:11px 13px;margin-bottom:12px;font-size:13px;font-weight:600;line-height:1.4}
    .keeper-chip{display:inline-flex;align-items:center;gap:6px;background:var(--orgp);color:var(--org2);border:2px solid var(--orgb);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer}
    /* Wizard */
    .steps{display:flex;gap:6px;padding:10px 16px 0;max-width:600px;margin:0 auto}
    .step-pill{flex:1;height:6px;border-radius:3px;background:var(--bdr)}
    .step-pill.on{background:var(--grn)}
    .step-pill.done{background:var(--grn2)}
    .wiz-nav{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
    .seg{display:flex;border:2px solid var(--bdr);border-radius:9px;overflow:hidden;flex-shrink:0}
    .seg button{border:none;background:#fff;padding:8px 11px;font-size:13px;font-weight:700;color:var(--txt2);cursor:pointer}
    .seg button.basis{background:var(--grn);color:#fff}
    .seg button.bank{background:var(--org);color:#fff}
    .selrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr)}
    .selrow:last-child{border-bottom:none}

// ----- Thema (kleuren passen zich aan het logo aan) -----
const GENERIC_THEME = { primary: '#2563eb', accent: '#f59e0b', dark: '#0f172a' };
function clamp255(n) { return Math.max(0, Math.min(255, Math.round(n))); }
function parseHex(h) { h = h.replace('#', ''); return { r: parseInt(h.slice(0,2),16), g: parseInt(h.slice(2,4),16), b: parseInt(h.slice(4,6),16) }; }
function toHex(r, g, b) { return '#' + [r,g,b].map(v => clamp255(v).toString(16).padStart(2,'0')).join(''); }
function mixHex(a, b, t) { const A = parseHex(a), B = parseHex(b); return toHex(A.r+(B.r-A.r)*t, A.g+(B.g-A.g)*t, A.b+(B.b-A.b)*t); }
function shade(hex, amt) { return amt < 0 ? mixHex(hex, '#000000', -amt) : mixHex(hex, '#ffffff', amt); }
function hueOf(r, g, b) { r/=255; g/=255; b/=255; const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn; if(!d) return 0; let h; if(mx===r) h=((g-b)/d)%6; else if(mx===g) h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; return h<0?h+360:h; }
function hueDist(a, b) { let d = Math.abs(a-b)%360; return d>180?360-d:d; }
function applyTheme(t) {
  t = t || GENERIC_THEME;
  const s = document.documentElement.style, set = (k,v) => s.setProperty(k,v);
  set('--grn', t.primary); set('--grn2', shade(t.primary,-0.18)); set('--grnp', mixHex(t.primary,'#ffffff',0.88)); set('--grnb', mixHex(t.primary,'#ffffff',0.7));
  set('--org', t.accent); set('--org2', shade(t.accent,-0.15)); set('--orgp', mixHex(t.accent,'#ffffff',0.86)); set('--orgb', mixHex(t.accent,'#ffffff',0.66));
  set('--blk', t.dark); set('--blk2', mixHex(t.dark,'#ffffff',0.1)); set('--blk3', mixHex(t.dark,'#ffffff',0.2));
  const meta = document.querySelector('meta[name=theme-color]'); if (meta) meta.content = t.dark;
}
function applyStoredTheme() { let t = null; try { t = JSON.parse(localStorage.getItem('voetbal_theme') || 'null'); } catch (e) {} applyTheme(t || GENERIC_THEME); }

// Dominante kleuren uit een canvas halen -> {primary, accent, dark}
function extractPalette(canvas) {
  let data;
  try { data = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data; } catch (e) { return null; }
  const buckets = {}; let darkBest = null;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
    if (a < 200) continue;
    const mx = Math.max(r,g,b), mn = Math.min(r,g,b), bright = (mx+mn)/2, sat = mx === 0 ? 0 : (mx-mn)/mx;
    if (bright < 75 && sat < 0.5) { if (!darkBest || bright < darkBest.bright) darkBest = { r, g, b, bright }; }
    if (bright > 232 || bright < 26 || sat < 0.28) continue;
    const key = Math.round(r/26) + ',' + Math.round(g/26) + ',' + Math.round(b/26);
    const e = buckets[key] || (buckets[key] = { r:0, g:0, b:0, n:0 });
    e.r += r; e.g += g; e.b += b; e.n++;
  }
  const arr = Object.values(buckets).map(e => ({ r: Math.round(e.r/e.n), g: Math.round(e.g/e.n), b: Math.round(e.b/e.n), n: e.n })).sort((a,b) => b.n - a.n);
  if (!arr.length) return null;
  const primary = arr[0], hp = hueOf(primary.r, primary.g, primary.b);
  let accent = arr.find(c => hueDist(hueOf(c.r,c.g,c.b), hp) > 40 && c.n > primary.n * 0.06);
  if (!accent) accent = arr[1] || primary;
  const dark = darkBest ? darkBest : { r: clamp255(primary.r*0.3), g: clamp255(primary.g*0.3), b: clamp255(primary.b*0.3) };
  return { primary: toHex(primary.r,primary.g,primary.b), accent: toHex(accent.r,accent.g,accent.b), dark: toHex(dark.r,dark.g,dark.b) };
}
// Vaste spelerskern per ploeg
function getRosters() { try { return JSON.parse(localStorage.getItem('voetbal_rosters') || '{}'); } catch (e) { return {}; } }
function rosterKey(t) { return (t || '').trim().toLowerCase(); }
function getRoster(t) { return getRosters()[rosterKey(t)] || []; }

function getTeamsV2() { try { return JSON.parse(localStorage.getItem('voetbal_teams_v2') || '[]'); } catch (e) { return []; } }
function saveTeamsV2(arr) { localStorage.setItem('voetbal_teams_v2', JSON.stringify(arr)); cloudOnLocalTeamsSave(arr); }

function migrateTeams() {
  if (localStorage.getItem('voetbal_teams_v2')) return;
  const out = [];
  const names = getTeams();           // lijst van ploegnamen (originele schrijfwijze)
  const rosters = getRosters();       // gekoppeld op kleine letters
  const seen = {};
  for (const name of names) {
    const r = rosters[rosterKey(name)] || [];
    out.push({ id: uid(), name, players: r.map(p => ({ id: uid(), name: p.name || '', number: p.number || '', pos: p.line || '' })) });
    seen[rosterKey(name)] = true;
  }
  for (const k of Object.keys(rosters)) {
    if (seen[k]) continue;
    out.push({ id: uid(), name: k, players: (rosters[k] || []).map(p => ({ id: uid(), name: p.name || '', number: p.number || '', pos: p.line || '' })) });
  }

}
// Score & opstelling herberekenen uit de events (na correctie/verwijdering)
function recomputeScore(m) {
  let us = 0, them = 0;
  for (const e of m.events) {
    if (e.type === 'goal_us') us++;
    else if (e.type === 'goal_them' || e.type === 'own_goal') them++;
    else if (e.type === 'penalty_us' && e.scored) us++;
    else if (e.type === 'penalty_them' && e.scored) them++;
  }
  m.scoreUs = us; m.scoreThem = them;
}
// Tussenstand t.e.m. een bepaald deel (kwart/helft/...).
function scoreUpToQuarter(m, qNum) {
  let us = 0, them = 0;
  for (const e of m.events) {
    if (e.quarterNum == null || e.quarterNum > qNum) continue;
    if (e.type === 'goal_us') us++;
    else if (e.type === 'goal_them' || e.type === 'own_goal') them++;
    else if (e.type === 'penalty_us' && e.scored) us++;
    else if (e.type === 'penalty_them' && e.scored) them++;
  }
  return { us, them };
}
function recomputeOnField(m) {
  const on = {}; m.players.forEach(p => on[p.id] = !!p.starting);
  for (const e of [...m.events].sort((a, b) => a.gameTimeMs - b.gameTimeMs)) {
    if (e.type === 'substitution') { if (e.playerOutId) on[e.playerOutId] = false; if (e.playerInId) on[e.playerInId] = true; }
    if (e.type === 'red_card' && e.playerId) on[e.playerId] = false;
    if (e.type === 'injury' && e.leavesField && e.playerId) on[e.playerId] = false;
  }
  m.players.forEach(p => p.onField = !!on[p.id]);
}

// ===================== DATABASE =====================
const DB_NAME = 'voetbal_db', DB_VER = 1;
let db;
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('matches')) d.createObjectStore('matches', { keyPath: 'id' });
    };
    r.onsuccess = e => res(e.target.result);
    r.onerror = e => rej(e.target.error);
  });
}
function dbAll() {
  return new Promise((res, rej) => {
    const r = db.transaction('matches','readonly').objectStore('matches').getAll();
    r.onsuccess = e => res(e.target.result.sort((a,b) => b.createdAt - a.createdAt));
    r.onerror = e => rej(e.target.error);
  });
}
function dbGet(id) {
  return new Promise((res, rej) => {
    const r = db.transaction('matches','readonly').objectStore('matches').get(id);
    r.onsuccess = e => res(e.target.result);
    r.onerror = e => rej(e.target.error);
  });
}
function dbSave(m) {
  return new Promise((res, rej) => {
    const r = db.transaction('matches','readwrite').objectStore('matches').put(m);
    r.onsuccess = () => { cloudOnLocalMatchSave(m); res(); };
    r.onerror = e => rej(e.target.error);
  });
}
function dbDel(id) {
  return new Promise((res, rej) => {
    const r = db.transaction('matches','readwrite').objectStore('matches').delete(id);
    r.onsuccess = () => { cloudOnLocalMatchDelete(id); res(); };
    r.onerror = e => rej(e.target.error);
  });
}
// Lokaal schrijven ZONDER naar de cloud te pushen (gebruikt door de cloud-listener zelf).
function dbPutLocal(m) {
  return new Promise((res, rej) => {
    const r = db.transaction('matches','readwrite').objectStore('matches').put(m);
    r.onsuccess = () => res();
    r.onerror = e => rej(e.target.error);
  });
}
function dbDelLocal(id) {
  return new Promise((res, rej) => {
    const r = db.transaction('matches','readwrite').objectStore('matches').delete(id);
    r.onsuccess = () => res();
    r.onerror = e => rej(e.target.error);
  });
}

function cloudListen() {

  fbdb.ref('teams').on('value', s => applyCloudTeams(s.val() || []));

async function applyCloudMatches(obj) {
  if (!db) return;
  const cloudIds = new Set(Object.keys(obj));
  const local = await dbAll();
  for (const m of local) { if (m.fromCloud && !cloudIds.has(m.id)) await dbDelLocal(m.id); }
  for (const id of cloudIds) {
    const m = obj[id]; if (!m) continue;
    m.id = id; m.fromCloud = true;
    if (!Array.isArray(m.events)) m.events = [];
    if (!Array.isArray(m.players)) m.players = [];
    if (!Array.isArray(m.quarters)) m.quarters = [];
    await dbPutLocal(m);
  }
  cloudRefreshUI();
}
function applyCloudTeams(val) {
  const cloud = Array.isArray(val) ? val : Object.values(val || {});
  const cloudIds = new Set(cloud.map(t => t && t.id).filter(Boolean));
  const localOnly = getTeamsV2().filter(t => !t.fromCloud && !cloudIds.has(t.id));
  const merged = localOnly.concat(cloud.map(t => Object.assign({}, t, { fromCloud: true })));
  localStorage.setItem('voetbal_teams_v2', JSON.stringify(merged));
  cloudRefreshUI();
}

function cloudRefreshUI() {
  if (view === 'home') loadHome();

  else if (view === 'teams') render();

}

// ===================== UTILS =====================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function pFirstName(p) { return p.firstName !== undefined ? p.firstName : (p.name || '').split(' ')[0]; }
function pLastName(p) { return p.lastName !== undefined ? p.lastName : (p.name || '').split(' ').slice(1).join(' '); }
function fmtTime(ms) {
  const s = Math.floor(Math.max(0,ms) / 1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function fmtDate(ts) { return new Date(ts).toLocaleDateString('nl-BE',{day:'numeric',month:'long',year:'numeric'}); }
function matchWhen(m) {
  const d = m.date ? new Date(m.date + 'T00:00:00').getTime() : m.createdAt;
  return fmtDate(d) + (m.time ? ' · ' + m.time : '');
}
function getGameTimeMs(m) {
  let t = 0;
  for (const q of m.quarters) {
    if (q.endTime) t += q.endTime - q.startTime - (q.totalPaused || 0);
    else if (q.startTime) t += (q.pausedAt ? q.pausedAt : Date.now()) - q.startTime - (q.totalPaused || 0);
  }
  return Math.max(0, t);
}
function getQElapsed(m) {
  const q = m.quarters[m.quarters.length - 1];
  if (!q || !q.startTime) return 0;
  const ref = q.endTime ? q.endTime : (q.pausedAt ? q.pausedAt : Date.now());
  return Math.max(0, ref - q.startTime - (q.totalPaused || 0));
}
function gameMin(ms) { return Math.floor(ms / 60000) + 1; }
function playersOnField(m) { return m.players.filter(p => p.onField); }
function playersOnBench(m) { return m.players.filter(p => !p.onField); }
// Veldbezetting inclusief reeds ingeplande pauzewissels (voor het plannen van meerdere wissels op rij).
function effectiveOnField(m) {
  const on = new Set(m.players.filter(p => p.onField).map(p => p.id));
  for (const s of (m.pendingSubs || [])) { on.delete(s.outId); on.add(s.inId); }
  return m.players.filter(p => on.has(p.id));
}

function calcMinutes(m) {
  const mins = {}, totalMs = getGameTimeMs(m), entry = {};
  for (const p of m.players) mins[p.id] = { ms: 0 };
  for (const p of m.players) if (p.starting) entry[p.id] = 0;
  const evts = [...m.events].sort((a,b) => a.gameTimeMs - b.gameTimeMs);
  for (const e of evts) {
    if (e.type === 'substitution') {
      if (entry[e.playerOutId] !== undefined) { mins[e.playerOutId].ms += e.gameTimeMs - entry[e.playerOutId]; delete entry[e.playerOutId]; }
      entry[e.playerInId] = e.gameTimeMs;
    }
    if (e.type === 'red_card' && entry[e.playerId] !== undefined) {
      mins[e.playerId].ms += e.gameTimeMs - entry[e.playerId]; delete entry[e.playerId];
    }
    // Blessure waarbij de speler het veld verlaat zonder directe wissel: stop de teller.
    if (e.type === 'injury' && e.leavesField && entry[e.playerId] !== undefined) {
      mins[e.playerId].ms += e.gameTimeMs - entry[e.playerId]; delete entry[e.playerId];
    }
  }
  for (const [pid, entryMs] of Object.entries(entry)) if (mins[pid]) mins[pid].ms += totalMs - entryMs;
  return mins;
}

function pName(m, id){ const p = m.players.find(x=>x.id===id); return p ? p.name : '?'; }
function evtLabel(e, m) {
  switch(e.type) {
    case 'goal_us': { let s = `⚽ Goal ${pName(m,e.playerId)}`; if (e.assistId) s += ` (assist ${pName(m,e.assistId)})`; return s; }
    case 'goal_them': return `⚽ Tegendoel`;
    case 'own_goal': return `⚽ Eigen doel (${pName(m,e.playerId)})`;
    case 'corner_us': { let s = '🚩 Hoekschop voor ons'; if (e.cornerType) s += ` · ${e.cornerType}`; if (e.playerId) s += ` · ${pName(m,e.playerId)}`; return s; }
    case 'corner_them': { let s = '🚩 Hoekschop tegen'; if (e.cornerType) s += ` · ${e.cornerType}`; return s; }
    case 'substitution': return `🔄 ${e.atBreak?'Pauzewissel: ':''}${pName(m,e.playerInId)} voor ${pName(m,e.playerOutId)}`;
    case 'yellow_card': return `🟨 Gele kaart ${pName(m,e.playerId)}`;
    case 'red_card': return `🟥 Rode kaart ${pName(m,e.playerId)}`;
    case 'penalty_us': return `🎯 Penalty voor ons${e.playerId?' · '+pName(m,e.playerId):''}${e.scored===true?' — GOAL':e.scored===false?' — gemist':''}`;
    case 'penalty_them': return `🎯 Penalty tegen${e.scored===true?' — tegendoel':e.scored===false?' — gemist':''}`;
    case 'freekick_us': return `⚡ Vrije trap voor ons${e.playerId?' · '+pName(m,e.playerId):''}`;
    case 'freekick_them': return `⚡ Vrije trap tegen`;
    case 'injury': { const it = e.injuryType==='kramp'?'Kramp':e.injuryType==='licht'?'Lichte blessure':'Ernstige blessure'; return `🤕 ${it} · ${pName(m,e.playerId)}${e.leavesField?' — verlaat veld':''}`; }
    case 'shot_us': return `🥅 Schot voor ons${e.onTarget?' (op doel)':''}`;
    case 'shot_them': return `🥅 Schot tegen${e.onTarget?' (op doel)':''}`;
    case 'save_us': return `🧤 Redding (onze keeper)`;
    case 'save_them': return `🧤 Redding tegenstander`;
    case 'disallowed_us': return `🚫 Afgekeurd doelpunt voor ons${e.reason?' · '+e.reason:''}`;
    case 'disallowed_them': return `🚫 Afgekeurd doelpunt tegen${e.reason?' · '+e.reason:''}`;
    case 'quarter_start': return `▶ ${pSing(m)} ${e.quarterNum} gestart`;
    case 'quarter_end': return `⏹ ${pSing(m)} ${e.quarterNum} afgelopen`;
    default: return e.type;
  }
}
// Events gegroepeerd per deel (kwart/helft/...), met de tussenstand t.e.m. dat deel.
// quarter_start / quarter_end worden weggelaten: de groepskop vervangt ze.
function eventsByQuarter(m) {
  const groups = [];
  const qnums = [...new Set(m.events.map(e => e.quarterNum).filter(n => n != null))].sort((a, b) => a - b);
  for (const qn of qnums) {
    const list = m.events.filter(e => e.quarterNum === qn && !e.type.startsWith('quarter')).sort((a, b) => a.gameTimeMs - b.gameTimeMs);
    groups.push({ qn, list, cum: scoreUpToQuarter(m, qn) });
  }
  const orphan = m.events.filter(e => e.quarterNum == null && !e.type.startsWith('quarter'));
  if (orphan.length) groups.push({ qn: null, list: orphan, cum: null });
  return groups;
}
// HTML-event-log voor het scherm (detail + live-log), met kwart-kop + tussenstand + verwijderknop.
function renderEventLog(m) {
  const groups = eventsByQuarter(m);
  if (!groups.length) return '<p style="color:var(--txt2);font-size:14px">Geen events.</p>';
  return groups.map(g => {
    const head = g.qn == null ? 'Overig' : `${pSing(m)} ${g.qn}`;
    const score = g.cum ? `<span class="qgroup-score"><span class="us">${g.cum.us}</span>–${g.cum.them}</span>` : '';
    const elog_ro = !!(m.fromCloud && !isAdmin);
    const items = g.list.length
      ? g.list.map(e => `<li><span class="emin">${gameMin(e.gameTimeMs)}'</span><span class="etxt">${evtLabel(e, m)}</span>${elog_ro ? '' : `<button class="evt-edit no-print" onclick="modalEditEvent('${e.id}')" title="Bewerken">✏️</button><button class="evt-del no-print" onclick="confirmDeleteEvent('${e.id}')" title="Verwijderen">×</button>`}</li>`).join('')
      : '<li class="qgroup-empty">Geen events in dit deel.</li>';
    return `<div class="qgroup"><div class="qgroup-head"><span>${head}</span>${score}</div><ul class="elog">${items}</ul></div>`;
  }).join('');
}

function startTimer() {

// Scherm wakker houden tijdens een lopend deel
let wakeLock = null;
async function requestWake() { try { if ('wakeLock' in navigator && !wakeLock) { wakeLock = await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release', () => { wakeLock = null; }); } } catch (e) {} }
async function releaseWake() { try { if (wakeLock) await wakeLock.release(); } catch (e) {} wakeLock = null; }
// Eindsignaal (geluid + trilling)
function beep() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext; const ac = new AC();
    const o = ac.createOscillator(), g = ac.createGain(); o.connect(g); g.connect(ac.destination);
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.001, ac.currentTime); g.gain.exponentialRampToValueAtTime(0.4, ac.currentTime + 0.02); g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.7);
    o.start(); o.stop(ac.currentTime + 0.72);
  } catch (e) {}
  try { if (navigator.vibrate) navigator.vibrate([250, 120, 250]); } catch (e) {}
}
function countdownOn() { return localStorage.getItem('voetbal_countdown') === '1'; }
function toggleCountdown() { localStorage.setItem('voetbal_countdown', countdownOn() ? '0' : '1'); render(); }
function timerText(m) {
  const elapsed = getQElapsed(m), durMs = (m.quarterDuration || 0) * 60000;
  if (countdownOn() && durMs) return elapsed < durMs ? '-' + fmtTime(durMs - elapsed) : '+' + fmtTime(elapsed - durMs);
  return fmtTime(elapsed);
}
function updateTimerDisplay() {
  const el = document.getElementById('timer-time'), lb = document.getElementById('timer-lbl');
  if (!el || !match) return;
  const q = match.quarters[match.quarters.length - 1];
  const elapsed = getQElapsed(match);
  const durMs = (match.quarterDuration || 0) * 60000;
  const isRunning = q && q.startTime && !q.pausedAt && !q.endTime;
  const overtime = isRunning && durMs && elapsed >= durMs;
  if (isRunning && durMs && elapsed >= durMs && q && !q.alerted) { q.alerted = true; beep(); dbSave(match); }
  el.textContent = timerText(match);
  el.style.color = overtime ? 'var(--org)' : '';
  if (lb) {
    const isPaused = q && q.pausedAt;
    lb.textContent = `Totale speeltijd: ${fmtTime(getGameTimeMs(match))}${isPaused ? ' · GEPAUZEERD' : (overtime ? ' · ⏰ tijd voorbij' : '')}`;
  }
}

function pitchDot(m, p, x, y) {

function renderPitch(m, players) {
  let dots = '';
  const xy = players.filter(p => typeof p.x === 'number' && typeof p.y === 'number');
  const rest = players.filter(p => !(typeof p.x === 'number' && typeof p.y === 'number'));
  for (const p of xy) dots += pitchDot(m, p, p.x, p.y);
  const byLine = {};
  for (const p of rest) { (byLine[p.line] = byLine[p.line] || []).push(p); }
  for (const [line, ps] of Object.entries(byLine)) {
    const y = LINE_Y[line] != null ? LINE_Y[line] : 50;
    const n = ps.length;
    ps.forEach((p, i) => { dots += pitchDot(m, p, n === 1 ? 50 : 18 + (i * (64 / (n - 1))), y); });
  }
  return `<div class="pitch">
    <div class="pitch-box top"></div><div class="pitch-box" style="bottom:0"></div>${dots}
  </div>
  <div class="field-legend">🟠 = doelman · cijfer in bol = rugnummer · onder = naam</div>`;
}
// Zelfstandige SVG-veldweergave voor de PDF (los venster, zonder de app-CSS).
function pitchSVG(m, players) {
  const W = 320, H = 480, R = 15;
  const pts = [];
  players.filter(p => typeof p.x === 'number' && typeof p.y === 'number').forEach(p => pts.push({ p, x: p.x, y: p.y }));
  const byLine = {};
  players.filter(p => !(typeof p.x === 'number' && typeof p.y === 'number')).forEach(p => { (byLine[p.line] = byLine[p.line] || []).push(p); });
  Object.entries(byLine).forEach(([line, ps]) => {
    const y = LINE_Y[line] != null ? LINE_Y[line] : 50, n = ps.length;
    ps.forEach((p, i) => pts.push({ p, x: n === 1 ? 50 : 18 + i * (64 / (n - 1)), y }));
  });
  const dots = pts.map(({ p, x, y }) => {
    const cx = (x / 100 * W).toFixed(1), cy = (y / 100 * H).toFixed(1);
    const gk = p.line === 'Doel', cap = (m.captainId === p.id) ? '© ' : '';
    return `<g><circle cx="${cx}" cy="${cy}" r="${R}" fill="${gk ? '#f5821f' : '#101010'}" stroke="#fff" stroke-width="2"/>` +
      `<text x="${cx}" y="${(+cy + 4).toFixed(1)}" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">${esc(p.number || '?')}</text>` +
      `<text x="${cx}" y="${(+cy + R + 12).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">${esc(cap + (p.name || ''))}</text></g>`;
  }).join('');
  return `<svg viewBox="-3 -3 ${W + 6} ${H + 6}" width="280" style="max-width:100%">
    <rect x="0" y="0" width="${W}" height="${H}" rx="10" fill="#1c8a46" stroke="#fff" stroke-width="3"/>
    <line x1="0" y1="${H / 2}" x2="${W}" y2="${H / 2}" stroke="rgba(255,255,255,.5)" stroke-width="2"/>
    <circle cx="${W / 2}" cy="${H / 2}" r="36" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2"/>
    <rect x="${W * 0.27}" y="0" width="${W * 0.46}" height="${H * 0.13}" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2"/>
    <rect x="${W * 0.27}" y="${H * 0.87}" width="${W * 0.46}" height="${H * 0.13}" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2"/>
    ${dots}
  </svg>`;
}

}

  const ageDays = lastB ? (Date.now() - +lastB) / 864e5 : Infinity;

}
// WEDSTRIJDEN = volledige lijst met filter + zoeken.
async function loadMatches() {

  if (!el) return;
  if (!all.length) {

    return;
  }
  const teams = [...new Set(all.map(m => m.teamName).filter(Boolean))].sort();

  const list = (homeFilter === 'all' ? all : all.filter(m => m.teamName === homeFilter)).slice();
  const filterBar = teams.length ? `<div class="filterbar">
    <select onchange="setHomeFilter(this.value)">

      ${teams.map(t => `<option value="${esc(t)}" ${homeFilter===t?'selected':''}>${esc(t)} (${all.filter(m=>m.teamName===t).length})</option>`).join('')}
    </select></div>` : '';
  // Gescheiden in duidelijke groepen: live · gepland (vroegste eerst) · gespeeld (recentste eerst).
  const live = list.filter(m => m.status === 'live');
  const planned = list.filter(m => m.status === 'planned').sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const done = list.filter(m => m.status === 'done').sort((a, b) => (b.date || '').localeCompare(a.date || '') || (b.createdAt - a.createdAt));
  const sec = (title, arr) => arr.length ? `<div class="sec">${title}</div>${arr.map(matchItemHtml).join('')}` : '';
  const items = list.length
    ? sec('🔴 Live', live) + sec('🗓 Geplande wedstrijden', planned) + sec('✅ Gespeelde wedstrijden', done)
    : `<div class="empty"><div class="ei">🔍</div><p>Geen wedstrijden voor deze ploeg.</p></div>`;
  const searchBar = all.length > 6 ? `<div class="searchbar"><input id="home-search" type="search" placeholder="🔍 Zoek op tegenstander, ploeg, plaats…" oninput="filterHomeItems(this.value)" value="${esc(homeSearch)}"></div>` : '';
  const newBtn = `<button class="btn btn-green" onclick="newMatch()" style="margin-bottom:12px">⚽ + Nieuwe wedstrijd</button>`;
  el.innerHTML = newBtn + filterBar + searchBar + `<div id="match-list">${items}</div>`;
  if (homeSearch) filterHomeItems(homeSearch);
}
let homeSearch = '';
function filterHomeItems(q) {
  homeSearch = q;
  const term = (q || '').trim().toLowerCase();
  const list = document.getElementById('match-list');
  if (!list) return;
  let shown = 0;
  list.querySelectorAll('.match-item').forEach(el => {
    const hit = !term || (el.getAttribute('data-s') || '').includes(term);
    el.style.display = hit ? '' : 'none';
    if (hit) shown++;
  });
  let none = document.getElementById('search-none');
  if (!shown && term) {
    if (!none) { none = document.createElement('div'); none.id = 'search-none'; none.className = 'empty'; none.innerHTML = '<div class="ei">🔍</div><p>Geen wedstrijden gevonden.</p>'; list.appendChild(none); }
  } else if (none) { none.remove(); }
}

let statsFilter = 'all', seasonFilter = 'all';
function setStatsFilter(v) { statsFilter = v; loadStats(); }
function setSeasonFilter(v) { seasonFilter = v; loadStats(); }
// Seizoen van een wedstrijd (Belgisch voetbalseizoen: juli–juni).
function seasonOf(m) {
  const d = m.date ? new Date(m.date + 'T00:00:00') : new Date(m.createdAt);
  const y = d.getFullYear(), start = d.getMonth() >= 6 ? y : y - 1;
  return `${start}/${start + 1}`;
}
async function loadStats() {
  const all = await dbAll();
  const el = document.getElementById('stats-content');
  if (!el) return;
  const teams = [...new Set(all.map(m => m.teamName).filter(Boolean))].sort();
  const seasons = [...new Set(all.map(seasonOf))].sort().reverse();
  if (statsFilter !== 'all' && !teams.includes(statsFilter)) statsFilter = 'all';
  if (seasonFilter !== 'all' && !seasons.includes(seasonFilter)) seasonFilter = 'all';
  const list = all.filter(m => (statsFilter === 'all' || m.teamName === statsFilter) && (seasonFilter === 'all' || seasonOf(m) === seasonFilter));
  const filterBar = `${teams.length ? `<div class="filterbar"><select onchange="setStatsFilter(this.value)">
      <option value="all" ${statsFilter==='all'?'selected':''}>Alle ploegen</option>
      ${teams.map(t => `<option value="${esc(t)}" ${statsFilter===t?'selected':''}>${esc(t)}</option>`).join('')}
    </select></div>` : ''}${seasons.length > 1 ? `<div class="filterbar"><select onchange="setSeasonFilter(this.value)">
      <option value="all" ${seasonFilter==='all'?'selected':''}>Alle seizoenen</option>
      ${seasons.map(s => `<option value="${s}" ${seasonFilter===s?'selected':''}>Seizoen ${s}</option>`).join('')}
    </select></div>` : ''}`;
  if (!list.length) { el.innerHTML = filterBar + `<div class="empty"><div class="ei">📊</div><p>Nog geen wedstrijden.</p></div>`; return; }
  let w = 0, d = 0, l = 0, gf = 0, ga = 0, cleanSheets = 0;
  const pl = {};
  const getp = (name, num) => { const k = (name || 'Speler').trim(); return pl[k] || (pl[k] = { name: k, number: num || '', goals: 0, assists: 0, ms: 0, yc: 0, rc: 0, mp: 0, cs: 0, squad: 0, absent: 0, lines: {} }); };
  for (const m of list) {
    gf += m.scoreUs; ga += m.scoreThem;
    if (m.scoreUs > m.scoreThem) w++; else if (m.scoreUs < m.scoreThem) l++; else d++;
    if (m.scoreThem === 0) cleanSheets++;
    const mins = calcMinutes(m);
    for (const p of (m.players || [])) {
      const r = getp(p.name, p.number); const ms = mins[p.id] ? mins[p.id].ms : 0;
      r.squad++;
      if (ms > 0) { r.mp++; r.lines[p.line] = (r.lines[p.line] || 0) + 1; }
      r.ms += ms;
      if (ms > 0 && p.line === 'Doel' && m.scoreThem === 0) r.cs++;  // clean sheet voor de keeper
    }
    for (const name of (m.absentPlayers || [])) { const r = getp(name); r.absent++; }
    for (const e of m.events) {
      if (e.type === 'goal_us' && e.playerId) { getp(pName(m, e.playerId)).goals++; if (e.assistId) getp(pName(m, e.assistId)).assists++; }
      if (e.type === 'penalty_us' && e.scored && e.playerId) getp(pName(m, e.playerId)).goals++;  // strafschopdoelpunt telt mee
      if (e.type === 'yellow_card' && e.playerId) getp(pName(m, e.playerId)).yc++;
      if (e.type === 'red_card' && e.playerId) getp(pName(m, e.playerId)).rc++;
    }
  }
  const players = Object.values(pl);
  const topList = (arr, val, unit) => arr.length ? arr.map((p, i) => `<div class="stat-row"><span class="stat-rank">${i+1}</span><span style="flex:1">${esc(p.name)}</span><span style="font-weight:800">${val(p)}${unit}</span></div>`).join('') : '<p style="color:var(--txt2);font-size:14px">—</p>';
  const scorers = players.filter(p => p.goals > 0).sort((a, b) => b.goals - a.goals).slice(0, 10);
  const assisters = players.filter(p => p.assists > 0).sort((a, b) => b.assists - a.assists).slice(0, 10);
  const minutes = players.filter(p => p.ms > 0).sort((a, b) => b.ms - a.ms).slice(0, 15);
  const fairplay = players.filter(p => p.mp > 0).sort((a, b) => (a.ms / a.mp) - (b.ms / b.mp)).slice(0, 12);
  const keepers = players.filter(p => p.cs > 0).sort((a, b) => b.cs - a.cs);
  const carded = players.filter(p => p.yc || p.rc).sort((a, b) => (b.yc + b.rc * 2) - (a.yc + a.rc * 2));
  const posList = players.filter(p => p.mp > 0 && Object.keys(p.lines).length).sort((a, b) => b.mp - a.mp);
  const anyAbsent = players.some(p => p.absent);
  const attend = players.filter(p => (p.squad + p.absent) > 0).sort((a, b) => (b.squad / (b.squad + b.absent)) - (a.squad / (a.squad + a.absent)) || b.squad - a.squad);
  el.innerHTML = filterBar + `
    <div class="card">
      <div class="stat-big" style="margin-bottom:10px">
        <div class="stat-box"><div class="v">${list.length}</div><div class="l">Gespeeld</div></div>
        <div class="stat-box"><div class="v" style="color:var(--grn)">${w}</div><div class="l">Winst</div></div>
        <div class="stat-box"><div class="v">${d}</div><div class="l">Gelijk</div></div>
        <div class="stat-box"><div class="v" style="color:var(--rd)">${l}</div><div class="l">Verlies</div></div>
      </div>
      <div class="stat-big">
        <div class="stat-box"><div class="v">${gf}</div><div class="l">Doelpunten voor</div></div>
        <div class="stat-box"><div class="v">${ga}</div><div class="l">Doelpunten tegen</div></div>
        <div class="stat-box"><div class="v">${gf-ga>=0?'+':''}${gf-ga}</div><div class="l">Saldo</div></div>
      </div>
    </div>
    <div class="sec">⚽ Topschutters</div><div class="card">${topList(scorers, p => p.goals, '')}</div>
    <div class="sec">🎯 Meeste assists</div><div class="card">${topList(assisters, p => p.assists, '')}</div>
    <div class="sec">⏱ Meeste speelminuten</div><div class="card">${minutes.length ? minutes.map((p,i)=>`<div class="stat-row"><span class="stat-rank">${i+1}</span><span style="flex:1">${esc(p.name)}<small style="color:var(--txt2);display:block">${p.mp} ${p.mp===1?'wedstrijd':'wedstrijden'} · gem. ${Math.round(p.ms/p.mp/60000)}'/match</small></span><span style="font-weight:800">${Math.floor(p.ms/60000)}'</span></div>`).join('') : '<p style="color:var(--txt2);font-size:14px">—</p>'}</div>
    <div class="sec">⚖️ Fair-play · minste speeltijd</div><div class="card"><p style="font-size:12px;color:var(--txt2);margin-bottom:8px">Gesorteerd op laagste gemiddelde speeltijd per wedstrijd — zo zie je snel wie meer speelkansen verdient.</p>${fairplay.length ? fairplay.map(p=>`<div class="stat-row"><span style="flex:1">${esc(p.name)}</span><span style="color:var(--txt2);font-size:13px">${p.mp} wd</span><span style="font-weight:800;min-width:64px;text-align:right">${Math.round(p.ms/p.mp/60000)}'/match</span></div>`).join('') : '<p style="color:var(--txt2);font-size:14px">—</p>'}</div>
    <div class="sec">🧤 Clean sheets</div><div class="card"><div class="stat-row"><span style="flex:1">Ploeg (geen tegendoel)</span><span style="font-weight:800">${cleanSheets}/${list.length}</span></div>${keepers.map(p=>`<div class="stat-row"><span style="flex:1">${esc(p.name)}</span><span style="font-weight:800">${p.cs}</span></div>`).join('')}</div>
    ${carded.length ? `<div class="sec">🟨 Kaarten</div><div class="card">${carded.map(p=>`<div class="stat-row"><span style="flex:1">${esc(p.name)}</span><span>${p.yc?'🟨'.repeat(p.yc):''}${p.rc?'🟥'.repeat(p.rc):''}</span></div>`).join('')}</div>` : ''}
    ${posList.length ? `<div class="sec">🧭 Posities <span style="font-weight:400;text-transform:none;color:var(--txt2)">(hoe vaak per linie)</span></div><div class="card">${posList.map(p=>{const parts=Object.entries(p.lines).sort((a,b)=>b[1]-a[1]).map(([l,c])=>`${LINE_SHORT[l]||l}×${c}`).join(' · ');return `<div class="stat-row"><span style="flex:1">${esc(p.name)}</span><span style="color:var(--txt2);font-size:13px">${parts}</span></div>`;}).join('')}</div>` : ''}
    ${anyAbsent ? `<div class="sec">📋 Aanwezigheid <span style="font-weight:400;text-transform:none;color:var(--txt2)">(in selectie / totaal)</span></div><div class="card">${attend.map(p=>{const tot=p.squad+p.absent;const pct=tot?Math.round(p.squad/tot*100):0;return `<div class="stat-row"><span style="flex:1">${esc(p.name)}</span><span style="color:var(--txt2);font-size:13px">${p.squad}/${tot}</span><span style="font-weight:800;min-width:46px;text-align:right${pct<60?';color:var(--org)':''}">${pct}%</span></div>`;}).join('')}</div>` : ''}`;
}

async function exportBackup() {
  const matches = await dbAll();
  const data = { app: 'voetbal', version: 2, exportedAt: Date.now(), matches,
    settings: { clubName: localStorage.getItem('voetbal_club_name'), clubLogo: localStorage.getItem('voetbal_club_logo'),
      teams: localStorage.getItem('voetbal_teams'), teamsV2: localStorage.getItem('voetbal_teams_v2'), lastTeam: localStorage.getItem('voetbal_last_team'),
      rosters: localStorage.getItem('voetbal_rosters'), countdown: localStorage.getItem('voetbal_countdown'),
      theme: localStorage.getItem('voetbal_theme'), dark: localStorage.getItem('voetbal_dark') } };
  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `voetbal-backup-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  localStorage.setItem('voetbal_last_backup', String(Date.now()));
}
function importBackup(input) {
  const f = input.files && input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    let data;
    try { data = JSON.parse(e.target.result); } catch (err) { alert('Ongeldig back-upbestand.'); return; }
    // Losse wedstrijd?
    if (data && data.app === 'voetbal-match' && data.match) {
      pendingRestore = { matches: [data.match], settings: null, single: true };
      openModal(`<h3>Wedstrijd importeren?</h3>
        <p style="text-align:center;color:var(--txt2);margin-bottom:16px"><b>${esc(data.match.teamName||'')} vs ${esc(data.match.opponent||'')}</b><br>Deze wordt toegevoegd aan je bestaande wedstrijden.</p>
        <button class="btn btn-green" onclick="doRestore('merge')">＋ Toevoegen</button>
        <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
      input.value = ''; return;
    }
    if (!data || data.app !== 'voetbal' || !Array.isArray(data.matches)) { alert('Dit lijkt geen geldige voetbal-back-up.'); return; }
    pendingRestore = data;
    openModal(`<h3>Back-up gevonden</h3>
      <p style="text-align:center;color:var(--txt2);margin-bottom:16px">${data.matches.length} wedstrijden in dit bestand.<br>Wil je ze <b>samenvoegen</b> met je huidige data, of <b>alles vervangen</b>?</p>
      <button class="btn btn-green" onclick="doRestore('merge')">🔗 Samenvoegen (toevoegen)</button>
      <button class="btn btn-red" style="margin-top:8px" onclick="doRestore('replace')">⚠ Alles vervangen</button>
      <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
    input.value = '';
  };

}
let pendingRestore = null;
async function doRestore(mode) {
  const data = pendingRestore;
  if (!data) return;
  const incoming = data.matches || [];
  const norm = s => (s || '').trim().toLowerCase();
  if (mode === 'replace') {
    await new Promise((res, rej) => { const tx = db.transaction('matches', 'readwrite'); const st = tx.objectStore('matches'); st.clear(); incoming.forEach(m => st.put(m)); tx.oncomplete = () => res(); tx.onerror = () => rej(); });
    const s = data.settings || {};
    const setOrDel = (k, v) => { if (v == null) localStorage.removeItem(k); else localStorage.setItem(k, v); };
    setOrDel('voetbal_club_name', s.clubName); setOrDel('voetbal_club_logo', s.clubLogo);
    setOrDel('voetbal_teams', s.teams); setOrDel('voetbal_teams_v2', s.teamsV2); setOrDel('voetbal_last_team', s.lastTeam);
    setOrDel('voetbal_rosters', s.rosters); setOrDel('voetbal_countdown', s.countdown);
    setOrDel('voetbal_theme', s.theme); setOrDel('voetbal_dark', s.dark);
  } else {
    // Samenvoegen: enkel wedstrijden toevoegen die nog niet bestaan (op id).
    const existing = await dbAll();
    const ids = new Set(existing.map(m => m.id));
    const toAdd = incoming.filter(m => !ids.has(m.id));
    if (toAdd.length) await new Promise((res, rej) => { const tx = db.transaction('matches', 'readwrite'); const st = tx.objectStore('matches'); toAdd.forEach(m => st.put(m)); tx.oncomplete = () => res(); tx.onerror = () => rej(); });
    // Ploegen samenvoegen (op naam) indien aanwezig in de back-up.
    if (data.settings && data.settings.teamsV2) {
      let inc = []; try { inc = JSON.parse(data.settings.teamsV2) || []; } catch (e) {}
      const cur = getTeamsV2(); const keys = new Set(cur.map(t => norm(t.name)));
      inc.forEach(t => { if (!keys.has(norm(t.name))) { cur.push(t); keys.add(norm(t.name)); } });
      saveTeamsV2(cur);
    }
  }
  localStorage.setItem('voetbal_setup_done', '1');
  pendingRestore = null;
  closeModal(); match = null; applyStoredTheme(); applyDark(); go('home');
  setTimeout(() => alert(mode === 'replace' ? 'Back-up hersteld ✓' : 'Samengevoegd ✓'), 100);
}
function handleLogoFile(input) {
  const f = input.files && input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const max = 256; let w = img.width, h = img.height;
      const scale = Math.min(1, max / Math.max(w, h));
      w = Math.round(w * scale); h = Math.round(h * scale);
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      pendingLogo = c.toDataURL('image/png');
      pendingTheme = extractPalette(c);
      if (pendingTheme) applyTheme(pendingTheme);
      setLogoPreview(pendingLogo);
    };
    img.onerror = () => alert('Kon deze afbeelding niet laden. Probeer een andere.');
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
}
function setLogoPreview(src) {
  const cur = document.getElementById('s-logo-img'); if (!cur) return;
  if (cur.tagName === 'IMG') { cur.src = src; }
  else { const img = document.createElement('img'); img.id = 's-logo-img'; img.src = src; img.alt = 'logo'; cur.replaceWith(img); }
}
function useDefaultLogo() {
  pendingLogo = 'DEFAULT'; pendingTheme = null;
  applyTheme(GENERIC_THEME);

}
function saveSettings(isFirst) {
  const name = (document.getElementById('s-name').value || '').trim();
  if (!name) { alert('Geef de naam van je club of ploeg in.'); return; }
  if (pendingLogo === null) { alert('Kies een logo: laad er een op of kies het standaardlogo.'); return; }
  localStorage.setItem('voetbal_club_name', name);
  if (pendingLogo === 'DEFAULT') { localStorage.setItem('voetbal_club_logo', 'logo-default.svg'); localStorage.removeItem('voetbal_theme'); }
  else {
    try { localStorage.setItem('voetbal_club_logo', pendingLogo); } catch (e) { alert('Het logo is te groot om te bewaren. Probeer een kleinere afbeelding.'); return; }
    if (pendingTheme) localStorage.setItem('voetbal_theme', JSON.stringify(pendingTheme)); else localStorage.removeItem('voetbal_theme');
  }
  localStorage.setItem('voetbal_setup_done', '1');
  applyStoredTheme();
  go('home');
}

function teamPasteApply() {
  const ta = document.getElementById('paste-area'); if (!ta) return;
  let added = 0;
  ta.value.split('\n').forEach(raw => {
    const line = raw.trim(); if (!line) return;
    const mtch = line.match(/^(\d{1,3})[\s.\-)]+(.*)$/);
    const number = mtch ? mtch[1] : '';
    const rest = (mtch ? mtch[2] : line).trim();
    if (!rest) return;
    const parts = rest.split(/\s+/);
    const firstName = parts.shift() || '';
    const lastName = parts.join(' ');
    editingTeam.players.push({ id: uid(), firstName, lastName, name: (firstName + ' ' + lastName).trim(), number, pos: '' });
    added++;
  });
  closeModal();
  if (added) render(); else alert('Geen spelers gevonden in de lijst.');

function buildPool() {
  const team = teamById(wiz.teamId);
  const guests = wiz.pool.filter(p => p.guest);
  const own = (team ? team.players : []).map(p => ({ pid: uid(), srcId: p.id, name: p.name, number: p.number || '', pos: p.pos || '', fromName: team.name, guest: false, sel: 'none', slot: null }));
  wiz.pool = own.concat(guests);
}
function wizBack() { if (wiz.step > 1) { wiz.step--; render(); } }
function wizLeave() {
  const dirty = wiz && ((wiz.opponent || '').trim() || (wiz.pool || []).some(p => p.sel && p.sel !== 'none'));
  if (dirty) {
    openModal(`<h3>Wedstrijd niet bewaren?</h3>
      <p style="text-align:center;color:var(--txt2);margin-bottom:16px">Je ingevulde gegevens gaan verloren.</p>
      <button class="btn btn-red" onclick="closeModal();wiz=null;go('home')">Verlaten zonder bewaren</button>
      <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Blijven</button>`);
  } else { wiz = null; go('home'); }
}
function wizNext() {
  if (wiz.step === 1) {
    captureStep1();
    if (!wiz.teamId) { alert('Kies of maak eerst een ploeg aan.'); return; }
    if (!wiz.opponent) { alert('Vul de tegenstander in.'); return; }
    if (wiz.poolTeamId !== wiz.teamId) { buildPool(); wiz.poolTeamId = wiz.teamId; }
    wiz.step = 2; render();
  } else if (wiz.step === 2) {
    if (basisCount() !== fieldSizeW()) { alert(`Kies exact ${fieldSizeW()} basisspelers (nu ${basisCount()}).`); return; }
    wiz.step = 3; render();
  }
}
// ----- Stap 2: selectie -----
function setSel(pid, val) {
  const p = wiz.pool.find(x => x.pid === pid); if (!p) return;
  p.sel = (p.sel === val) ? 'none' : val;
  if (p.sel !== 'basis') p.slot = null;
  render();
}
function selRow(p) {
  return `<div class="selrow">
    <input type="number" class="pn-inp" value="${esc(p.number)}" placeholder="?" onchange="setPoolNum('${p.pid}',this.value)" inputmode="numeric" aria-label="Rugnummer">
    <div class="nm">${esc(p.name)}${p.guest ? '<span class="guest-badge">gast</span>' : ''}<small>${p.pos || '—'}</small></div>
    <div class="seg">
      <button class="${p.sel==='basis'?'basis':''}" onclick="setSel('${p.pid}','basis')">Basis</button>
      <button class="${p.sel==='bank'?'bank':''}" onclick="setSel('${p.pid}','bank')">Bank</button>
      <button class="${p.sel==='absent'?'absent':''}" onclick="setSel('${p.pid}','absent')" title="Afwezig / speelt elders">✗</button>
    </div></div>`;
}
function setPoolNum(pid, val) { const p = wiz.pool.find(x => x.pid === pid); if (p) p.number = val; }
function wizStep2() {
  const own = wiz.pool.filter(p => !p.guest), guests = wiz.pool.filter(p => p.guest);
  const team = teamById(wiz.teamId);
  const need = fieldSizeW(), bc = basisCount();
  const absentCount = wiz.pool.filter(p => p.sel === 'absent').length;
  return `
    <div class="card" style="display:flex;gap:10px;text-align:center">
      <div style="flex:1"><div style="font-size:22px;font-weight:900;color:${bc===need?'var(--grn)':'var(--org)'}">${bc}/${need}</div><div style="font-size:11px;color:var(--txt2)">BASIS</div></div>
      <div style="flex:1"><div style="font-size:22px;font-weight:900">${bankCount()}</div><div style="font-size:11px;color:var(--txt2)">BANK</div></div>
      ${absentCount ? `<div style="flex:1"><div style="font-size:22px;font-weight:900;color:var(--rd)">${absentCount}</div><div style="font-size:11px;color:var(--txt2)">AFWEZIG</div></div>` : ''}
    </div>
    <div class="sec">${esc(team ? team.name : 'Ploeg')}</div>
    <div class="card">${own.length ? own.map(selRow).join('') : '<p style="color:var(--txt2);font-size:14px">Deze ploeg heeft nog geen spelers. Voeg ze toe via 👥 Ploegen.</p>'}</div>
    ${guests.length ? `<div class="sec">Gastspelers</div><div class="card">${guests.map(selRow).join('')}</div>` : ''}
    <button class="btn btn-orgpale" onclick="addGuestsModal()">+ Speler van andere ploeg</button>
    <div class="wiz-nav">
      <button class="btn btn-gray" onclick="wizBack()">← Vorige</button>
      <button class="btn btn-green" onclick="wizNext()">Volgende →</button>
    </div>`;
}
// ----- Gastspelers -----
let guestModalTeam = null, guestPick = [];
function addGuestsModal() {
  const teams = getTeamsV2().filter(t => t.id !== wiz.teamId);
  if (!teams.length) { alert('Er zijn geen andere ploegen om uit te kiezen.'); return; }
  guestModalTeam = teams[0].id; guestPick = [];
  openModal(`<h3>Gastspelers toevoegen</h3>
    <div class="fg"><label>Ploeg</label><select onchange="guestModalTeam=this.value;guestPick=[];document.getElementById('guest-list').innerHTML=guestListHtml()">${teams.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select></div>
    <div id="guest-list">${guestListHtml()}</div>
    <button class="btn btn-green" style="margin-top:12px" onclick="confirmGuests()">✓ Toevoegen</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
function guestListHtml() {
  const t = teamById(guestModalTeam); if (!t) return '';
  const existing = wiz.pool.map(p => p.srcId);
  if (!t.players.length) return '<p style="color:var(--txt2);font-size:14px">Deze ploeg heeft geen spelers.</p>';
  return t.players.map(p => { const already = existing.includes(p.id);
    return `<div class="selrow"><div class="pn">${p.number || '?'}</div><div class="nm">${esc(p.name)}${already ? '<small>al in selectie</small>' : ''}</div>
      <input type="checkbox" ${already ? 'disabled' : ''} onchange="toggleGuest('${p.id}')" style="width:22px;height:22px"></div>`; }).join('');
}
function toggleGuest(srcId) { const i = guestPick.indexOf(srcId); if (i >= 0) guestPick.splice(i, 1); else guestPick.push(srcId); }
function confirmGuests() {
  const t = teamById(guestModalTeam);
  guestPick.forEach(srcId => { const p = t.players.find(x => x.id === srcId); if (p && !wiz.pool.some(pp => pp.srcId === srcId)) wiz.pool.push({ pid: uid(), srcId: p.id, name: p.name, number: p.number || '', pos: p.pos || '', fromName: t.name, guest: true, sel: 'bank', slot: null }); });
  guestPick = []; closeModal(); render();
}
// ----- Stap 3: opstelling -----
function setFormation(idx) { wiz.formationIndex = parseInt(idx); wiz.pool.forEach(p => p.slot = null); wiz.selPlace = null; render(); }
function selectPlace(pid) { wiz.selPlace = (wiz.selPlace === pid) ? null : pid; render(); }
function placeSlot(i) {
  const occupied = wiz.pool.find(p => p.sel === 'basis' && p.slot === i);
  if (wiz.selPlace) {
    const sp = wiz.pool.find(p => p.pid === wiz.selPlace);
    if (sp) { if (occupied && occupied !== sp) occupied.slot = null; sp.slot = i; wiz.selPlace = null; }
  } else if (occupied) { occupied.slot = null; }
  render();
}
function autoPlace() {
  const form = FORMATIONS[wiz.matchType][wiz.formationIndex];
  const basis = wiz.pool.filter(p => p.sel === 'basis');
  basis.forEach(p => p.slot = null);
  const used = {};
  form.slots.forEach((s, i) => { const c = basis.find(p => p.slot == null && !used[p.pid] && p.pos === s.line); if (c) { c.slot = i; used[c.pid] = 1; } });
  form.slots.forEach((s, i) => { if (basis.some(p => p.slot === i)) return; const c = basis.find(p => p.slot == null && !used[p.pid]); if (c) { c.slot = i; used[c.pid] = 1; } });
  wiz.selPlace = null; render();
}
function clearPlacement() { wiz.pool.forEach(p => p.slot = null); wiz.selPlace = null; render(); }
function wizPitch(form) {
  const slots = form.slots.map((s, i) => {
    const p = wiz.pool.find(pp => pp.sel === 'basis' && pp.slot === i);
    if (p) return `<div class="pslot filled ${s.line==='Doel'?'gk':''}" style="left:${s.x}%;top:${s.y}%" onclick="placeSlot(${i})">${p.number || '?'}<span class="pslot-lbl">${esc(p.name)}</span></div>`;
    return `<div class="pslot" style="left:${s.x}%;top:${s.y}%" onclick="placeSlot(${i})">${LINE_SHORT[s.line] || ''}</div>`;
  }).join('');
  return `<div class="pitch"><div class="pitch-box top"></div><div class="pitch-box" style="bottom:0"></div>${slots}</div>`;
}
function wizStep3() {
  const forms = FORMATIONS[wiz.matchType] || [];
  const form = forms[wiz.formationIndex] || forms[0];
  const unplaced = wiz.pool.filter(p => p.sel === 'basis' && p.slot == null);
  return `
    <div class="fg"><label>Formatie</label>
      <select onchange="setFormation(this.value)">${forms.map((f, i) => `<option value="${i}" ${i===wiz.formationIndex?'selected':''}>${f.name}</option>`).join('')}</select></div>
    <div class="card">${wizPitch(form)}
      <div class="field-legend">Tik een speler hieronder, tik dan een plaats. Tik een bezette plaats om weg te halen.</div>
    </div>
    <div class="sec">Nog te plaatsen (${unplaced.length})</div>
    <div class="place-chips">${unplaced.length ? unplaced.map(p => `<span class="place-chip ${wiz.selPlace===p.pid?'sel':''}" onclick="selectPlace('${p.pid}')"><span class="pcn">${p.number || '?'}</span>${esc(p.name)}</span>`).join('') : '<span style="color:var(--grn);font-weight:700;font-size:14px">✓ Iedereen geplaatst</span>'}</div>
    <div class="wiz-nav" style="margin-top:14px">
      <button class="btn btn-gray btn-sm" style="width:auto" onclick="autoPlace()">✨ Auto-plaats</button>
      <button class="btn btn-gray btn-sm" style="width:auto" onclick="clearPlacement()">↺ Wissen</button>
    </div>
    <div class="wiz-nav">
      <button class="btn btn-gray" onclick="wizBack()">← Vorige</button>
      <button class="btn btn-green" onclick="finishWizard(true)">⚽ ${wiz.editId?'Opslaan & starten':'Nu starten'}</button>
    </div>
    <button class="btn btn-orgpale" onclick="finishWizard(false)" style="margin-top:8px">🗓 ${wiz.editId?'Opslaan (gepland)':'Plannen voor later'}</button>`;
}
async function finishWizard(startNow) {
  const form = FORMATIONS[wiz.matchType][wiz.formationIndex];
  const unplaced = wiz.pool.filter(p => p.sel === 'basis' && p.slot == null);
  if (unplaced.length) { alert(`Plaats nog ${unplaced.length} speler(s) op het veld.`); return; }
  const team = teamById(wiz.teamId);
  const starters = wiz.pool.filter(p => p.sel === 'basis').map(p => { const s = form.slots[p.slot]; return { id: uid(), name: p.name || 'Speler', number: p.number || '', line: s.line, posNum: '', starting: true, onField: true, x: s.x, y: s.y }; });
  const bench = wiz.pool.filter(p => p.sel === 'bank').map(p => ({ id: uid(), name: p.name || 'Speler', number: p.number || '', line: p.pos || 'Middenveld', posNum: '', starting: false, onField: false }));
  const common = {
    teamName: team ? team.name : (wiz.teamNameFallback || 'Ploeg'), formation: form.name,
    competition: wiz.competition, matchday: wiz.matchday, referee: wiz.referee, jersey: wiz.jersey, weather: wiz.weather,
    trainer: wiz.trainer || '', responsible: wiz.responsible || '',
    opponent: wiz.opponent, date: wiz.date, time: wiz.time, location: wiz.location,
    matchType: wiz.matchType, fieldSize: MATCH_TYPES[wiz.matchType].field,
    periodKey: wiz.periodKey, numQuarters: PERIOD_TYPES[wiz.periodKey].count, quarterDuration: wiz.quarterDuration,
    players: starters.concat(bench),
    absentPlayers: wiz.pool.filter(p => p.sel === 'absent').map(p => p.name),
  };
  let m;
  if (wiz.editId) {
    const existing = await dbGet(wiz.editId);
    m = Object.assign(existing || {}, common);
    m.status = startNow ? 'live' : (m.status === 'live' ? 'live' : 'planned');
    m.captainId = null; m.motmId = null; // spelers kregen nieuwe id's
  } else {
    m = Object.assign({ id: uid(), createdAt: Date.now(), notes: '', motmId: null, captainId: null, quarters: [], currentQuarter: 0, quarterStatus: 'not_started', scoreUs: 0, scoreThem: 0, events: [] }, common);
    m.status = startNow ? 'live' : 'planned';
  }
  wiz = null; await dbSave(m); match = m;
  await go(startNow ? 'live' : 'prep', m.id);
}
// Een geplande wedstrijd opnieuw in de wizard openen om te bewerken.
function editMatchWizard(m) {
  const team = getTeamsV2().find(t => t.name === m.teamName);
  const fi = Math.max(0, (FORMATIONS[m.matchType] || []).findIndex(f => f.name === m.formation));
  wiz = {
    step: 1, editId: m.id, editStatus: m.status, teamNameFallback: m.teamName,
    teamId: team ? team.id : '', opponent: m.opponent, date: m.date, time: m.time, location: m.location,
    matchType: m.matchType, periodKey: m.periodKey, quarterDuration: m.quarterDuration,
    competition: m.competition || 'Competitie', matchday: m.matchday || '', referee: m.referee || '', jersey: m.jersey || '', weather: m.weather || '',
    trainer: m.trainer || '', responsible: m.responsible || '', trainerIsOther: false,
    pool: m.players.map(p => ({ pid: uid(), srcId: null, name: p.name, number: p.number || '', pos: p.line || '', fromName: m.teamName, guest: false, sel: p.starting ? 'basis' : 'bank', slot: null, _x: p.x, _y: p.y })),
    formationIndex: fi, selPlace: null,
  };
  wiz.poolTeamId = wiz.teamId; // niet opnieuw opbouwen, behoud de selectie
  const form = FORMATIONS[m.matchType][fi];
  wiz.pool.filter(p => p.sel === 'basis').forEach(p => { const idx = form.slots.findIndex(s => s.x === p._x && s.y === p._y); p.slot = idx >= 0 ? idx : null; });
  go('new');
}

async function startPlanned() { match.status = 'live'; await dbSave(match); await go('live', match.id); }
// ----- Snel resultaat invoeren (wedstrijd die al gespeeld is, zonder live opvolging) -----
let qrScorers = {};
function modalQuickResult() {
  const m = match; qrScorers = {};
  openModal(`<h3>⚡ Snel resultaat</h3>
    <p style="text-align:center;color:var(--txt2);font-size:13px;margin-bottom:14px">Voor een wedstrijd die al gespeeld is. Vul de eindstand in; speeltijd wordt niet bijgehouden.</p>
    <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:end;margin-bottom:14px">
      <div class="fg" style="margin:0"><label>${esc(tName(m))}</label><input id="qr-us" type="number" inputmode="numeric" value="0" style="text-align:center;font-size:22px;font-weight:800"></div>
      <div style="font-size:22px;font-weight:800;padding-bottom:12px">–</div>
      <div class="fg" style="margin:0"><label>${esc(m.opponent)}</label><input id="qr-them" type="number" inputmode="numeric" value="0" style="text-align:center;font-size:22px;font-weight:800"></div>
    </div>
    <div class="sec" style="margin-top:0">Doelpuntenmakers (optioneel)</div>
    <div>${m.players.map(p => `<div class="selrow"><div class="nm">${esc(p.name)}</div><div class="seg"><button type="button" onclick="qrAdj('${p.id}',-1)">−</button><span id="qr-c-${p.id}" style="min-width:34px;text-align:center;font-weight:800;padding:0 6px;align-self:center">0</span><button type="button" onclick="qrAdj('${p.id}',1)">+</button></div></div>`).join('')}</div>
    <button class="btn btn-green" style="margin-top:12px" onclick="saveQuickResult()">✓ Opslaan als gespeeld</button>
    <button class="btn btn-gray" style="margin-top:8px" onclick="closeModal()">Annuleren</button>`);
}
function qrAdj(id, d) { qrScorers[id] = Math.max(0, (qrScorers[id] || 0) + d); const el = document.getElementById('qr-c-' + id); if (el) el.textContent = qrScorers[id]; }
async function saveQuickResult() {
  const us = Math.max(0, parseInt(document.getElementById('qr-us').value) || 0);
  const them = Math.max(0, parseInt(document.getElementById('qr-them').value) || 0);
  match.events = (match.events || []).filter(e => !e.quick); // eerdere snelinvoer wissen
  const sum = Object.values(qrScorers).reduce((a, b) => a + b, 0);
  const usFinal = Math.max(us, sum);
  Object.entries(qrScorers).forEach(([pid, c]) => { for (let i = 0; i < c; i++) match.events.push({ id: uid(), realTime: Date.now(), gameTimeMs: 0, quarterNum: null, type: 'goal_us', playerId: pid, assistId: null, quick: true }); });
  for (let i = 0; i < usFinal - sum; i++) match.events.push({ id: uid(), realTime: Date.now(), gameTimeMs: 0, quarterNum: null, type: 'goal_us', playerId: null, assistId: null, quick: true });
  for (let i = 0; i < them; i++) match.events.push({ id: uid(), realTime: Date.now(), gameTimeMs: 0, quarterNum: null, type: 'goal_them', quick: true });
  recomputeScore(match);
  match.status = 'done'; match.quarterStatus = 'done';
  await dbSave(match); closeModal(); go('detail', match.id);
}

function addPlayerToMatch() {
  const lines = MATCH_TYPES[match.matchType].lines;

function removePlayer(id) {

function setCaptain(id) {

async function saveEditPlayers() {
  match.players.forEach(p => { if (!p.name) p.name = 'Speler'; });

  closeModal();
